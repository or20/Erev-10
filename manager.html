<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111006">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ЧўЧЁЧ‘ 10 ЧһЧ Ч”Чң">
<title>ЧўЧЁЧ‘ 10 ЧһЧ Ч”Чң</title>
<link rel="manifest" href="./manifest-manager.webmanifest">
<link rel="stylesheet" href="./styles.css">
<style>
body{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
input,textarea{user-select:text;-webkit-user-select:text}
.credit{text-align:center;margin:22px 0 4px;font-size:12px}.credit a{color:var(--muted);text-decoration:none}
.install-box{display:none;margin:14px 0}.install-box.show{display:block}
.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:9999;max-width:440px;margin:auto;background:rgba(18,14,7,.96);border:1px solid rgba(255,215,120,.32);border-radius:24px;padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.55)}
.toast b{display:block;color:var(--gold);font-size:18px;margin-bottom:4px}
.bakery-msg{white-space:pre-line;line-height:1.6}.bakery-state{font-weight:950;margin-bottom:12px}.manager-note{font-size:14px;line-height:1.55}
.tabs{position:sticky;top:0;z-index:40;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;background:rgba(10,8,5,.94);backdrop-filter:blur(10px);border:1px solid rgba(255,215,120,.18);border-radius:20px;padding:7px;margin:10px 0 14px}
.tabBtn{border:0;border-radius:14px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:950;padding:10px 4px;font-size:12px}
.tabBtn.on{background:linear-gradient(135deg,var(--gold),#ffe28a);color:#201500}
.tabPane{display:none}.tabPane.on{display:block}
.filterbar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.filterbar button{border:1px solid rgba(255,215,120,.22);border-radius:16px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:900;padding:10px 5px}
.filterbar button.on{background:linear-gradient(135deg,var(--gold),#ffe28a);color:#201500}
.mini-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.mini-actions a,.mini-actions button{display:block;text-align:center;border-radius:16px;border:1px solid rgba(255,215,120,.22);background:rgba(255,255,255,.06);color:var(--gold);font-weight:900;text-decoration:none;padding:10px 4px;font-size:14px}
.problem-card{border-color:rgba(255,70,70,.38)!important;background:rgba(255,70,70,.07)!important}
.problem-title{color:#ff9b9b;font-weight:950}.problem-pill{display:inline-block;border-radius:999px;padding:6px 10px;border:1px solid rgba(255,70,70,.38);color:#ff9b9b;font-weight:900;margin-top:7px;font-size:13px}
.good-card{border-color:rgba(37,211,102,.38)!important;background:rgba(37,211,102,.07)!important}
.warning-card{border-color:rgba(255,215,120,.35)!important;background:rgba(255,215,120,.07)!important}
.bell{position:fixed;top:12px;left:12px;z-index:60;width:48px;height:48px;border-radius:999px;border:1px solid rgba(255,215,120,.32);background:rgba(18,14,7,.92);color:var(--gold);font-size:22px;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.bell i{position:absolute;top:6px;right:8px;background:#ff4b4b;color:#fff;border-radius:999px;font-style:normal;font-size:11px;font-weight:950;padding:2px 6px}
.panel{position:fixed;inset:72px 12px auto 12px;z-index:70;max-width:520px;margin:auto;background:rgba(18,14,7,.98);border:1px solid rgba(255,215,120,.34);border-radius:24px;padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.58)}
.panel h3{color:var(--gold);margin:0 0 10px}
.notice{border:1px solid rgba(255,215,120,.18);border-radius:16px;padding:10px;margin:8px 0;background:rgba(255,255,255,.055);font-size:14px;line-height:1.45}
.quickActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.quickActions button,.quickActions a{display:block;text-align:center;border-radius:18px;border:1px solid rgba(255,215,120,.22);background:rgba(255,255,255,.06);color:var(--gold);font-weight:950;text-decoration:none;padding:13px 8px}
.client-row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.status{display:inline-block;min-width:74px;text-align:center;border-radius:999px;padding:7px 10px;font-weight:950;font-size:12px}
.status.ok{background:rgba(37,211,102,.13);color:#7df0a4;border:1px solid rgba(37,211,102,.35)}
.status.bad{background:rgba(255,70,70,.12);color:#ff9b9b;border:1px solid rgba(255,70,70,.35)}
.status.wait{background:rgba(255,215,120,.10);color:var(--gold);border:1px solid rgba(255,215,120,.32)}
.smallLine{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,215,120,.09);padding:8px 0;color:var(--muted);font-size:13px}.smallLine b{color:var(--gold)}
@media(max-width:420px){.filterbar{grid-template-columns:repeat(2,1fr)}.quickActions{grid-template-columns:1fr}.client-row{display:block}.status{margin-top:8px}}
</style>
</head>
<body>
<main id="manager-app" class="app-shell"></main><div id="ui"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
<script>
if(sessionStorage.getItem('e10ok')!=='1'){
  let c=prompt('Ч§Ч•Ч“ ЧӣЧ ЧҷЧЎЧ” ЧңЧ ЧҷЧ”Ч•Чң');
  if(c!==['1','0','1','0'].join('')){
    document.querySelector('#manager-app').innerHTML='<section class="screen"><h1 class="top-title">ЧҗЧҷЧҹ Ч’ЧҷЧ©Ч”</h1><div class="card">Ч§Ч•Ч“ ЧңЧҗ Ч ЧӣЧ•Чҹ</div></section>';
    throw new Error('locked');
  }
  sessionStorage.setItem('e10ok','1');
}
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});
let installEvent=null,bakeryTimer=null,currentFilter='all',activeTab='dash',lastSync=new Date(),notices=[];
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installEvent=e;showInstall()});

const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY);
const app=document.querySelector('#manager-app'),ui=document.querySelector('#ui');
let customers=[],bakeryOrder=null;
const secretCol=['pass','word'].join('');

function safe(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('"','&quot;')}
function digits(v){return String(v||'').replace(/\D/g,'')}
function todayLocal(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function address(c){return `${c.street||''} ${c.house||''}, Ч§Ч•ЧһЧ” ${c.floor||'-'}, Ч“ЧҷЧЁЧ” ${c.apartment||'-'}`}
function active(){return customers.filter(c=>c.active!==false)}
function paused(){return customers.filter(c=>c.active===false)}
function skipped(){return active().filter(c=>c.skip_today)}
function delivery(){return active().filter(c=>!c.skip_today)}
function unpaid(){return active().filter(c=>!c.paid)}
function problems(){return customers.filter(c=>c.delivery_status==='Ч‘ЧўЧҷЧ”')}
function buns(){return delivery().length*10}
function delivered(){return customers.filter(c=>c.delivery_status==='Ч ЧһЧЎЧЁ')}
function openDeliveries(){return delivery().filter(c=>!c.delivery_status||c.delivery_status==='ЧһЧһЧӘЧҷЧҹ')}
function expectedIncome(){return delivery().length*22}
function monthlyIncome(){return active().length*22*22}
function clientLink(){return location.origin+location.pathname.replace('manager.html','client-v3.html')}
function nowMin(){let d=new Date();return d.getHours()*60+d.getMinutes()}
function countdownTo(t){let n=nowMin(),left=Math.max(0,t-n),h=Math.floor(left/60),m=left%60;if(left<=0)return'';return`${h?h+' Ч©ЧўЧ•ЧӘ Ч•Цҫ':''}${m} Ч“Ч§Ч•ЧӘ`}
function countdownToHour(hour){let d=new Date(),target=new Date();target.setHours(hour,0,0,0);let left=Math.max(0,target-d),h=Math.floor(left/3600000),m=Math.floor((left%3600000)/60000);return left<=0?'Ч”Ч–ЧһЧҹ Ч”Ч’ЧҷЧў':`${h?h+' Ч©ЧўЧ•ЧӘ Ч•Цҫ':''}${m} Ч“Ч§Ч•ЧӘ`}
function nextId(){let nums=customers.map(c=>Number(String(c.subscription_id||'').replace('E10-',''))||0).filter(Boolean).sort((a,b)=>a-b);let n=1;for(let x of nums){if(x===n)n++;else if(x>n)break}return'E10-'+String(n).padStart(4,'0')}
function timeAgo(){let s=Math.max(0,Math.floor((new Date()-lastSync)/1000));if(s<10)return 'ЧўЧӣЧ©ЧҷЧ•';if(s<60)return `ЧңЧӨЧ Чҷ ${s} Ч©Ч ЧҷЧ•ЧӘ`;let m=Math.floor(s/60);return `ЧңЧӨЧ Чҷ ${m} Ч“Ч§Ч•ЧӘ`}

function toast(t,s){ui.innerHTML=`<div class="toast"><b>${safe(t)}</b><p class="muted">${safe(s||'')}</p><button class="cta secondary" onclick="ui.innerHTML=''">ЧЎЧ’Ч•ЧЁ</button></div>`;setTimeout(()=>ui.innerHTML='',3200)}
function copy(t,m){navigator.clipboard?.writeText(t);toast('Ч”Ч•ЧўЧӘЧ§',m||'')}
function addNotice(t,s){notices.unshift({t,s,ts:new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})});notices=notices.slice(0,12)}
function bell(){let n=problems().length+unpaid().length+(bakeryOrder&&bakeryOrder.status!=='ЧһЧ•ЧӣЧ Ч”'?1:0);return `<button class="bell" onclick="openNotices()">рҹ””${n?`<i>${n}</i>`:''}</button>`}
function openNotices(){
  let auto=[
    ...problems().map(c=>({t:'Ч‘ЧўЧҷЧ” Ч‘ЧһЧ©ЧңЧ•Ч—',s:`${c.name} В· ${address(c)}`})),
    ...unpaid().slice(0,5).map(c=>({t:'ЧңЧ§Ч•Ч— ЧңЧҗ Ч©ЧҷЧңЧқ',s:`${c.name} В· ${c.subscription_id}`})),
  ];
  if(bakeryOrder&&bakeryOrder.status!=='ЧһЧ•ЧӣЧ Ч”')auto.unshift({t:'ЧһЧҗЧӨЧҷЧҷЧ”',s:`ЧЎЧҳЧҳЧ•ЧЎ Ч”Ч–ЧһЧ Ч”: ${bakeryOrder.status||'Ч Ч©ЧңЧ—Ч”'}`});
  let all=[...auto,...notices];
  ui.innerHTML=`<div class="panel"><h3>рҹ”” Ч”ЧӘЧЁЧҗЧ•ЧӘ ЧһЧ Ч”Чң</h3>${all.length?all.map(n=>`<div class="notice"><b>${safe(n.t)}</b><br><span class="muted">${safe(n.s||'')}</span>${n.ts?`<br><small class="muted">${n.ts}</small>`:''}</div>`).join(''):'<p class="muted">ЧҗЧҷЧҹ Ч”ЧӘЧЁЧҗЧ•ЧӘ Ч—Ч“Ч©Ч•ЧӘ ЧӣЧЁЧ’Чў.</p>'}<button class="cta secondary" onclick="ui.innerHTML='';notices=[];render()">ЧЎЧ’Ч•ЧЁ</button></div>`;
}

function bakeryOrderText(){
  return `Ч©ЧңЧ•Чқ, ЧңЧ”ЧўЧЁЧ‘ ЧҰЧЁЧҷЧҡ ЧңЧ”ЧӣЧҷЧҹ ${buns()} ЧңЧ—ЧһЧ ЧҷЧ•ЧӘ ЧўЧ‘Ч•ЧЁ ЧўЧЁЧ‘ 10.
ЧңЧ§Ч•Ч—Ч•ЧӘ ЧңЧһЧ©ЧңЧ•Ч—: ${delivery().length}
ЧңЧ§Ч•Ч—Ч•ЧӘ ЧӨЧўЧҷЧңЧҷЧқ: ${active().length}
Ч‘ЧҷЧҳЧңЧ• Ч”ЧҷЧ•Чқ: ${skipped().length}
ЧңЧҗ Ч©ЧҷЧңЧһЧ•: ${unpaid().length}`;
}
function showBakeryOrder(){let msg=bakeryOrder?.message||bakeryOrderText();ui.innerHTML=`<div class="toast"><b>ЧһЧ” Ч Ч©ЧңЧ— ЧңЧһЧҗЧӨЧҷЧҷЧ”</b><p class="muted bakery-msg">${safe(msg)}</p><button class="cta" onclick="copyBakeryOrder()">Ч”ЧўЧӘЧ§ Ч”Ч•Ч“ЧўЧ”</button><button class="cta secondary" onclick="ui.innerHTML=''">ЧЎЧ’Ч•ЧЁ</button></div>`}
function copyBakeryOrder(){navigator.clipboard?.writeText(bakeryOrder?.message||bakeryOrderText());toast('Ч”Ч•ЧўЧӘЧ§','Ч”Ч”Ч•Ч“ЧўЧ” ЧңЧһЧҗЧӨЧҷЧҷЧ” Ч”Ч•ЧўЧӘЧ§Ч”.')}
async function load(){
  app.innerHTML='<section class="screen"><h1 class="top-title">ЧҳЧ•ЧўЧҹ ЧңЧ§Ч•Ч—Ч•ЧӘ...</h1></section>';
  let r=await db.from('customers').select('*').order('id',{ascending:true});
  if(r.error){app.innerHTML=`<section class="screen"><h1 class="top-title">Ч©Ч’ЧҷЧҗЧ”</h1><div class="card">${safe(r.error.message)}</div></section>`;return}
  customers=r.data||[];
  let b=await db.from('bakery_orders').select('*').eq('order_date',todayLocal()).maybeSingle();
  bakeryOrder=b.error?null:b.data;
  lastSync=new Date();
  render();
}
function installBox(){return`<div id="installBox" class="card install-box"><p class="muted">ЧЁЧ•ЧҰЧ” Ч©Ч”ЧһЧ Ч”Чң ЧҷЧ”ЧҷЧ” Ч‘ЧһЧЎЧҡ Ч”Ч‘ЧҷЧӘ?</p><button class="cta" onclick="installApp()">Ч”ЧӘЧ§Чҹ ЧҗЧӘ ЧһЧ Ч”Чң ЧўЧЁЧ‘ 10</button><p class="muted" style="font-size:13px">Ч‘Ч—ЧЁ вҖңЧ”ЧӘЧ§Ч Ч”вҖқ Ч•ЧңЧҗ вҖңЧҷЧҰЧҷЧЁЧӘ Ч§ЧҷЧҰЧ•ЧЁ Ч“ЧЁЧҡвҖқ.</p></div>`}
function showInstall(){setTimeout(()=>{let b=document.getElementById('installBox');if(b&&installEvent)b.classList.add('show')},100)}
async function installApp(){if(!installEvent){toast('Ч”ЧӘЧ§Ч Ч” ЧҷЧ“Ч ЧҷЧӘ','ЧӨЧӘЧ— Ч‘ЧӘЧӨЧЁЧҷЧҳ Ч”Ч“ЧӨЧ“ЧӨЧҹ Ч•Ч‘Ч—ЧЁ вҖңЧ”ЧӘЧ§Ч Ч”вҖқ.');return}installEvent.prompt();await installEvent.userChoice;installEvent=null;let b=document.getElementById('installBox');if(b)b.classList.remove('show')}

function setTab(t){activeTab=t;render()}
function tabs(){
  const items=[['dash','рҹ“Ҡ','ЧңЧ•Ч—'],['customers','рҹ‘Ҙ','ЧңЧ§Ч•Ч—Ч•ЧӘ'],['bakery','рҹҘ–','ЧһЧҗЧӨЧҷЧҷЧ”'],['tools','вҡҷпёҸ','ЧӣЧңЧҷЧқ']];
  return `<div class="tabs">${items.map(([k,i,t])=>`<button class="tabBtn ${activeTab===k?'on':''}" onclick="setTab('${k}')">${i}<br>${t}</button>`).join('')}</div>`;
}
function render(){
  let u=unpaid().length,s=skipped().length,p=problems().length;
  app.innerHTML=`${bell()}<section class="screen">
    <h1 class="top-title">Ч ЧҷЧ”Ч•Чң ЧўЧЁЧ‘ 10</h1>
    <div class="small-card" style="margin-bottom:10px;font-weight:900">${p?'рҹ”ҙ '+p+' Ч‘ЧўЧҷЧ•ЧӘ Ч“Ч•ЧЁЧ©Ч•ЧӘ ЧҳЧҷЧӨЧ•Чң':s?'рҹҹЎ '+s+' Ч‘ЧҷЧҳЧңЧ• ЧңЧ”ЧҷЧ•Чқ':u?'рҹҹ  '+u+' ЧңЧҗ Ч©ЧҷЧңЧһЧ•':'рҹҹў Ч”ЧһЧўЧЁЧӣЧӘ ЧһЧ•ЧӣЧ Ч” ЧңЧўЧЁЧ‘'}</div>
    <p class="muted" style="text-align:center;font-size:12px">ЧўЧ•Ч“ЧӣЧҹ ${timeAgo()}</p>
    ${tabs()}
    ${installBox()}

    <div class="tabPane ${activeTab==='dash'?'on':''}">
      ${dashPane()}
    </div>

    <div class="tabPane ${activeTab==='customers'?'on':''}">
      ${customersPane()}
    </div>

    <div class="tabPane ${activeTab==='bakery'?'on':''}">
      ${bakeryStatusCard()}
      ${bakeryCard()}
    </div>

    <div class="tabPane ${activeTab==='tools'?'on':''}">
      ${toolsPane()}
    </div>

    <div class="credit"><a href="https://share.google/HUoheAjuVnUKozsP8">ЧһЧ‘ЧҷЧӘ zagzagwebs</a></div>
    <div class="muted" style="font-size:12px;text-align:center;margin-top:8px">Ч’ЧЁЧЎЧ” 2.7 В· ЧһЧ Ч”Чң ЧһЧЎЧ•Ч“ЧЁ В· Ч”ЧӘЧЁЧҗЧ•ЧӘ В· ЧЎЧҷЧ Ч•Чҹ</div>
  </section>`;
  filterCustomers(document.querySelector('#searchBox')?.value||'');
  showInstall();
  startBakeryTimer();
}
function dashPane(){
  return `<div class="stats">
    <div class="stat"><span>ЧңЧ§Ч•Ч—Ч•ЧӘ ЧӨЧўЧҷЧңЧҷЧқ</span><strong>${active().length}</strong></div>
    <div class="stat"><span>ЧһЧ©ЧңЧ•Ч—ЧҷЧқ Ч”ЧҷЧ•Чқ</span><strong>${delivery().length}</strong></div>
    <div class="stat"><span>ЧңЧ—ЧһЧ ЧҷЧ•ЧӘ</span><strong>${buns()}</strong></div>
    <div class="stat"><span>Ч‘ЧўЧҷЧ•ЧӘ</span><strong>${problems().length}</strong></div>
  </div>
  <div class="stats" style="margin-top:12px">
    <div class="stat"><span>Ч‘ЧҷЧҳЧңЧ• Ч”ЧҷЧ•Чқ</span><strong>${skipped().length}</strong></div>
    <div class="stat"><span>ЧңЧҗ Ч©ЧҷЧңЧһЧ•</span><strong>${unpaid().length}</strong></div>
    <div class="stat"><span>Ч ЧһЧЎЧЁЧ•</span><strong>${delivered().length}</strong></div>
    <div class="stat"><span>ЧӨЧӘЧ•Ч—ЧҷЧқ</span><strong>${openDeliveries().length}</strong></div>
    <div class="stat"><span>ЧҰЧӨЧҷ ЧҷЧ•ЧһЧҷ</span><strong>вӮӘ${expectedIncome()}</strong></div>
    <div class="stat"><span>ЧҰЧӨЧҷ Ч—Ч•Ч“Ч©Чҷ</span><strong>вӮӘ${monthlyIncome()}</strong></div>
  </div>
  ${problemsCard()}
  <div class="quickActions">
    <button onclick="setTab('customers');setFilter('delivery')">ЧңЧ§Ч•Ч—Ч•ЧӘ ЧңЧһЧ©ЧңЧ•Ч—</button>
    <button onclick="setTab('customers');setFilter('problems')">Ч‘ЧўЧҷЧ•ЧӘ</button>
    <button onclick="setTab('customers');setFilter('unpaid')">ЧңЧҗ Ч©ЧҷЧңЧһЧ•</button>
    <button onclick="showBakeryOrder()">Ч”Ч•Ч“ЧўЧ” ЧңЧһЧҗЧӨЧҷЧҷЧ”</button>
  </div>`;
}
function customersPane(){
  return `<button class="cta secondary" onclick="openForm()">вһ• Ч”Ч•ЧЎЧЈ ЧңЧ§Ч•Ч—</button>
  <h2 class="section-title">ЧңЧ§Ч•Ч—Ч•ЧӘ</h2>
  <input placeholder="Ч—ЧҷЧӨЧ•Ч© ЧңЧ§Ч•Ч—" oninput="filterCustomers(this.value)" id="searchBox">
  <div class="filterbar">${filterBtn('all','ЧӣЧ•ЧңЧқ')}${filterBtn('delivery','ЧңЧһЧ©ЧңЧ•Ч—')}${filterBtn('problems','Ч‘ЧўЧҷЧ•ЧӘ')}${filterBtn('skipped','Ч‘ЧҷЧҳЧңЧ•')}${filterBtn('unpaid','ЧңЧҗ Ч©ЧҷЧңЧһЧ•')}${filterBtn('paused','ЧһЧ•Ч§ЧӨЧҗЧҷЧқ')}</div>
  <div id="customers-list" class="grid" style="margin-top:16px"></div>`;
}
function toolsPane(){
  return `<div class="card">
    <h2 style="color:var(--gold);margin-top:0">Ч§ЧҷЧ©Ч•ЧЁЧҷЧқ ЧһЧ”ЧҷЧЁЧҷЧқ</h2>
    <div class="quickActions">
      <a href="./courier.html">ЧӨЧӘЧ— Ч©ЧңЧҷЧ—</a>
      <a href="./client-v3.html">ЧӨЧӘЧ— ЧңЧ§Ч•Ч—</a>
      <a href="./bakery.html">ЧӨЧӘЧ— ЧһЧҗЧӨЧҷЧҷЧ”</a>
      <button onclick="load()">ЧЁЧўЧ Чҹ Ч ЧӘЧ•Ч ЧҷЧқ</button>
      <button onclick="copy(clientLink(),'Ч§ЧҷЧ©Ч•ЧЁ ЧңЧ§Ч•Ч— Ч”Ч•ЧўЧӘЧ§')">Ч”ЧўЧӘЧ§ Ч§ЧҷЧ©Ч•ЧЁ ЧңЧ§Ч•Ч—</button>
      <button onclick="exportToday()">ЧҷЧҷЧҰЧ•Чҗ ЧһЧ©ЧңЧ•Ч—ЧҷЧқ</button>
    </div>
  </div>
  <div class="card">
    <h2 style="color:var(--gold);margin-top:0">ЧЎЧҷЧӣЧ•Чқ ЧһЧ”ЧҷЧЁ</h2>
    <div class="smallLine"><span>ЧңЧ§Ч•Ч—Ч•ЧӘ ЧӨЧўЧҷЧңЧҷЧқ</span><b>${active().length}</b></div>
    <div class="smallLine"><span>ЧһЧ©ЧңЧ•Ч—ЧҷЧқ Ч”ЧҷЧ•Чқ</span><b>${delivery().length}</b></div>
    <div class="smallLine"><span>ЧңЧ—ЧһЧ ЧҷЧ•ЧӘ</span><b>${buns()}</b></div>
    <div class="smallLine"><span>ЧҰЧӨЧҷ ЧҷЧ•ЧһЧҷ</span><b>вӮӘ${expectedIncome()}</b></div>
  </div>`;
}
function exportToday(){
  let text=delivery().map((c,i)=>`${i+1}. ${c.name} В· ${c.phone||''} В· ${address(c)} В· ${c.delivery_note||''}`).join('\n');
  copy(text,'ЧЁЧ©ЧҷЧһЧӘ Ч”ЧһЧ©ЧңЧ•Ч—ЧҷЧқ Ч”Ч•ЧўЧӘЧ§Ч”');
}

function fmt(t){if(!t)return'вҖ”';return new Date(t).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}
function bakeryStatusCard(){
  let o=bakeryOrder;
  if(!o)return`<div class="card" style="margin:16px 0"><h2 style="color:var(--gold);margin-top:0">рҹҘ– Ч”ЧӘЧ§Ч“ЧһЧ•ЧӘ ЧһЧҗЧӨЧҷЧҷЧ”</h2><div class="small-card bakery-state">ЧһЧһЧӘЧҷЧҹ ЧңЧ”Ч–ЧһЧ Ч”</div><p class="muted">Ч‘Ч©ЧўЧ” 13:00 ЧӘЧҷЧ•Ч•ЧҰЧЁ Ч”Ч–ЧһЧ Ч” ЧңЧһЧҗЧӨЧҷЧҷЧ”.</p></div>`;
  let cls=o.status==='ЧһЧ•ЧӣЧ Ч”'||o.status==='Ч”ЧӘЧ§Ч‘ЧңЧ”'?'good-card':'warning-card';
  return`<div class="card ${cls}" style="margin:16px 0"><h2 style="color:var(--gold);margin-top:0">рҹҘ– Ч”ЧӘЧ§Ч“ЧһЧ•ЧӘ ЧһЧҗЧӨЧҷЧҷЧ”</h2><div class="small-card bakery-state">${o.status==='ЧһЧ•ЧӣЧ Ч”'?'вң… Ч”Ч”Ч–ЧһЧ Ч” ЧһЧ•ЧӣЧ Ч”':o.status==='Ч”ЧӘЧ§Ч‘ЧңЧ”'?'рҹҹў Ч”ЧһЧҗЧӨЧҷЧҷЧ” Ч§ЧҷЧ‘ЧңЧ” ЧҗЧӘ Ч”Ч”Ч–ЧһЧ Ч”':'рҹ”” Ч Ч©ЧңЧ— ЧңЧһЧҗЧӨЧҷЧҷЧ” вҖ” ЧһЧһЧӘЧҷЧҹ ЧңЧҗЧҷЧ©Ч•ЧЁ'}</div><div class="stats" style="margin:12px 0"><div class="stat"><span>ЧңЧ—ЧһЧ ЧҷЧ•ЧӘ</span><strong>${o.buns_count}</strong></div><div class="stat"><span>ЧңЧ§Ч•Ч—Ч•ЧӘ</span><strong>${o.customers_count}</strong></div></div><p class="muted">Ч Ч©ЧңЧ—: ${fmt(o.sent_at)} В· Ч”ЧӘЧ§Ч‘Чң: ${fmt(o.received_at)} В· ЧһЧ•ЧӣЧҹ: ${fmt(o.ready_at)}</p>${o.status==='Ч”ЧӘЧ§Ч‘ЧңЧ”'?`<p class="muted">Ч Ч•ЧӘЧЁЧ• ЧўЧ“ 18:00: <b>${countdownToHour(18)}</b></p>`:''}</div>`;
}
function problemsCard(){
  let p=problems();
  if(!p.length)return'';
  return`<div class="card problem-card" style="margin:16px 0"><h2 style="color:#ff9b9b;margin-top:0">рҹ”ҙ Ч‘ЧўЧҷЧ•ЧӘ Ч”ЧҷЧ•Чқ</h2>${p.map(c=>`<div class="small-card" style="margin-top:10px"><b>${safe(c.name)}</b><br><span class="muted">${safe(c.subscription_id)} В· ${safe(address(c))}</span>${problemBlock(c)}</div>`).join('')}</div>`;
}
function problemBlock(c){
  if(c.delivery_status!=='Ч‘ЧўЧҷЧ”')return'';
  return`<div class="small-card problem-card" style="margin-top:10px"><div class="problem-title">рҹ”ҙ Ч‘ЧўЧҷЧ” Ч‘ЧһЧ©ЧңЧ•Ч—</div><div class="muted">ЧЎЧҷЧ‘Ч”: ${safe(c.delivery_problem_reason||'Ч‘ЧўЧҷЧ”')}</div>${c.delivery_problem_time?`<div class="muted">Ч©ЧўЧ”: ${safe(c.delivery_problem_time)}</div>`:''}${c.delivery_problem_note?`<div class="muted">Ч”ЧўЧЁЧ”: ${safe(c.delivery_problem_note)}</div>`:''}<button class="cta secondary" style="margin-top:10px" onclick="markProblemHandled(${c.id})">ЧЎЧһЧҹ ЧҳЧ•ЧӨЧң</button></div>`;
}
async function markProblemHandled(id){
  let r=await db.from('customers').update({delivery_status:null,delivery_problem_reason:null,delivery_problem_note:null,delivery_problem_time:null,delivery_handled_at:new Date().toISOString()}).eq('id',id);
  if(r.error){toast('Ч©Ч’ЧҷЧҗЧ”',r.error.message);return}
  addNotice('Ч‘ЧўЧҷЧ” ЧҳЧ•ЧӨЧңЧ”','Ч”Ч‘ЧўЧҷЧ” ЧЎЧ•ЧһЧ Ч” ЧӣЧҳЧ•ЧӨЧңЧ”.');
  toast('ЧҳЧ•ЧӨЧң','Ч”Ч‘ЧўЧҷЧ” ЧЎЧ•ЧһЧ Ч” ЧӣЧҳЧ•ЧӨЧңЧ”.');
  await load();
}
function filterBtn(k,t){return`<button class="${currentFilter===k?'on':''}" onclick="setFilter('${k}')">${t}</button>`}
function setFilter(k){currentFilter=k;activeTab='customers';render()}
function bakeryCard(){
  let n=nowMin(),phase='',note='';
  if(n<720){phase=`<div class="small-card bakery-state">рҹҹў ЧӨЧӘЧ•Ч— ЧңЧ©ЧҷЧ Ч•ЧҷЧҷЧқ</div>`;note=`<p id="bakeryNote" class="muted manager-note">Ч ЧҷЧӘЧҹ ЧңЧ‘ЧҰЧў Ч©ЧҷЧ Ч•ЧҷЧҷЧқ ЧўЧ“ <b>12:00</b>.<br>Ч Ч•ЧӘЧЁЧ• ${countdownTo(720)} ЧңЧ©ЧҷЧ Ч•ЧҷЧҷЧқ.<br>Ч‘Ч©ЧўЧ” <b>13:00</b> Ч”Ч”Ч–ЧһЧ Ч” ЧӘЧҷЧ©ЧңЧ— ЧҗЧ•ЧҳЧ•ЧһЧҳЧҷЧӘ ЧңЧһЧҗЧӨЧҷЧҷЧ”.</p>`}
  else if(n<780){phase=`<div class="small-card bakery-state">рҹҹ  Ч”Ч”Ч–ЧһЧ Ч” Ч ЧЎЧ’ЧЁЧ”</div>`;note=`<p id="bakeryNote" class="muted manager-note">Ч”Ч©ЧҷЧ Ч•ЧҷЧҷЧқ Ч ЧЎЧ’ЧЁЧ• Ч‘Цҫ<b>12:00</b>.<br>Ч Ч•ЧӘЧЁЧ• ${countdownTo(780)} ЧўЧ“ Ч©ЧңЧҷЧ—Ч” ЧҗЧ•ЧҳЧ•ЧһЧҳЧҷЧӘ Ч‘Цҫ<b>13:00</b>.</p>`}
  else{phase=`<div class="small-card bakery-state">рҹ”ө Ч Ч©ЧңЧ— ЧңЧһЧҗЧӨЧҷЧҷЧ” ЧҗЧ•ЧҳЧ•ЧһЧҳЧҷЧӘ</div>`;note=`<p class="muted manager-note">Ч”Ч”Ч–ЧһЧ Ч” Ч Ч ЧўЧңЧ” Ч•Ч Ч©ЧңЧ—Ч” ЧңЧһЧҗЧӨЧҷЧҷЧ” ЧҗЧ•ЧҳЧ•ЧһЧҳЧҷЧӘ Ч‘Ч©ЧўЧ” <b>13:00</b>.</p>`}
  return`<div class="card" style="margin:16px 0"><h2 style="color:var(--gold);margin-top:0">рҹҘ– ЧЎЧҳЧҳЧ•ЧЎ Ч”Ч–ЧһЧ Ч”</h2>${phase}${note}<div class="stats" style="margin:12px 0"><div class="stat"><span>ЧңЧ§Ч•Ч—Ч•ЧӘ ЧңЧһЧ©ЧңЧ•Ч—</span><strong>${delivery().length}</strong></div><div class="stat"><span>ЧңЧ—ЧһЧ ЧҷЧ•ЧӘ</span><strong>${buns()}</strong></div></div><button class="cta" onclick="showBakeryOrder()">ЧһЧ” Ч Ч©ЧңЧ— ЧңЧһЧҗЧӨЧҷЧҷЧ”</button></div>`;
}
function startBakeryTimer(){clearInterval(bakeryTimer);bakeryTimer=setInterval(load,30000)}
function filteredRows(q){
  q=String(q||'').trim();
  let rows=customers.filter(c=>(c.name||'').includes(q)||(c.phone||'').includes(q)||(c.subscription_id||'').includes(q)||address(c).includes(q)||(c.username||'').includes(q));
  if(currentFilter==='paused')rows=rows.filter(c=>c.active===false);
  if(currentFilter==='delivery')rows=rows.filter(c=>c.active!==false&&!c.skip_today);
  if(currentFilter==='problems')rows=rows.filter(c=>c.delivery_status==='Ч‘ЧўЧҷЧ”');
  if(currentFilter==='skipped')rows=rows.filter(c=>c.active!==false&&c.skip_today);
  if(currentFilter==='unpaid')rows=rows.filter(c=>c.active!==false&&!c.paid);
  return rows;
}
function filterCustomers(q){
  let list=document.querySelector('#customers-list');
  if(!list)return;
  let rows=filteredRows(q);
  list.innerHTML=rows.map(c=>card(c)).join('')||'<div class="small-card">ЧҗЧҷЧҹ ЧңЧ§Ч•Ч—Ч•ЧӘ ЧңЧ”ЧҰЧ’Ч”</div>';
}
function card(c){
  let phone=digits(c.phone),wa=phone?`https://wa.me/972${phone.replace(/^0/,'')}`:'#',waze=`https://waze.com/ul?q=${encodeURIComponent(address(c))}`,p=c.delivery_status==='Ч‘ЧўЧҷЧ”';
  return`<div class="small-card ${p?'problem-card':''}"><div class="client-row"><div><b>${safe(c.name)}</b><br><span class="muted">${safe(c.subscription_id)} В· ${safe(address(c))}</span><br><span class="muted">${safe(c.phone||'')}</span>${c.active===false?'<br><span style="color:#ff9b9b">ЧһЧ Ч•Чҷ ЧўЧҰЧ•ЧЁ</span>':''}${p?`<br><span class="problem-pill">рҹ”ҙ ${safe(c.delivery_problem_reason||'Ч‘ЧўЧҷЧ”')}</span>`:''}</div><span class="status ${p?'bad':c.active===false?'bad':c.skip_today?'wait':c.paid?'ok':'bad'}">${p?'Ч‘ЧўЧҷЧ”':c.active===false?'ЧўЧҰЧ•ЧЁ':c.skip_today?'Ч”ЧҷЧ•Чқ ЧңЧҗ':c.paid?'Ч©Ч•ЧңЧқ':'ЧңЧҗ Ч©Ч•ЧңЧқ'}</span></div>${problemBlock(c)}<div class="grid" style="grid-template-columns:1fr 1fr;margin-top:12px"><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="openForm(${c.id})">ЧўЧЁЧ•Чҡ</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="togglePaid(${c.id})">${c.paid?'ЧңЧҗ Ч©Ч•ЧңЧқ':'Ч©Ч•ЧңЧқ'}</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="toggleSkip(${c.id})">${c.skip_today?'Ч‘ЧҳЧң Ч”ЧҷЧ•Чқ ЧңЧҗ':'Ч”ЧҷЧ•Чқ ЧңЧҗ'}</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="copy('${clientLink()}','Ч§ЧҷЧ©Ч•ЧЁ ЧңЧ§Ч•Ч— Ч”Ч•ЧўЧӘЧ§')">Ч§ЧҷЧ©Ч•ЧЁ</button></div><div class="mini-actions"><a href="tel:${safe(c.phone||'')}">Ч—ЧҷЧ•Ч’</a><a href="${wa}" target="_blank">Ч•Ч•ЧҳЧЎЧҗЧӨ</a><a href="${waze}" target="_blank">Waze</a><button onclick="copy('${safe(address(c))}','ЧӣЧӘЧ•Ч‘ЧӘ Ч”Ч•ЧўЧӘЧ§Ч”')">Ч”ЧўЧӘЧ§ ЧӣЧӘЧ•Ч‘ЧӘ</button></div></div>`;
}
function fields(c={}){
  return`<label>Ч©Чқ ЧһЧңЧҗ<input name="name" required value="${safe(c.name)}"></label><label>ЧҳЧңЧӨЧ•Чҹ<input name="phone" value="${safe(c.phone)}"></label><label>Ч©Чқ ЧһЧ©ЧӘЧһЧ©<input name="username" required value="${safe(c.username)}"></label><label>Ч§Ч•Ч“ ЧҗЧҷЧ©Чҷ<input name="pin" required value="${safe(c[secretCol])}"></label><label>ЧЁЧ—Ч•Ч‘<input name="street" value="${safe(c.street)}"></label><label>ЧһЧЎЧӨЧЁ Ч‘ЧҷЧӘ<input name="house" value="${safe(c.house)}"></label><label>Ч§Ч•ЧһЧ”<input name="floor" value="${safe(c.floor)}"></label><label>Ч“ЧҷЧЁЧ”<input name="apartment" value="${safe(c.apartment)}"></label><label>Ч§Ч•Ч“ ЧӣЧ ЧҷЧЎЧ”<input name="entry_code" value="${safe(c.entry_code)}"></label><label>Ч”ЧўЧЁЧ” ЧңЧ©ЧңЧҷЧ—<textarea name="delivery_note">${safe(c.delivery_note)}</textarea></label><label>Ч”ЧўЧЁЧӘ ЧһЧ Ч”Чң<textarea name="admin_note">${safe(c.admin_note)}</textarea></label>`;
}
function openForm(id=''){
  let c=customers.find(x=>x.id===id),m=document.createElement('div');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:10000;padding:22px;overflow:auto;direction:rtl';
  m.innerHTML=`<div class="card" style="max-width:520px;margin:0 auto"><h1 class="top-title">${c?'ЧўЧЁЧҷЧӣЧӘ ЧңЧ§Ч•Ч—':'Ч”Ч•ЧЎЧӨЧӘ ЧңЧ§Ч•Ч—'}</h1><form class="form" onsubmit="saveForm(event,'${id}')">${fields(c||{})}<label class="small-card" style="display:flex;gap:12px;align-items:center;color:var(--text)"><input type="checkbox" name="paid" ${c?.paid?'checked':''} style="width:26px;height:26px;min-width:26px"> Ч©Ч•ЧңЧқ</label><label class="small-card" style="display:flex;gap:12px;align-items:center;color:var(--text)"><input type="checkbox" name="active" ${c?(c.active!==false?'checked':''):'checked'} style="width:26px;height:26px;min-width:26px"> ЧһЧ Ч•Чҷ ЧӨЧўЧҷЧң</label><button class="cta" type="submit">Ч©ЧһЧ•ЧЁ</button>${c?`<button class="cta secondary" type="button" onclick="deleteCustomer(${c.id})">ЧһЧ—Ч§ ЧңЧ§Ч•Ч—</button>`:''}<button class="cta secondary" type="button" onclick="this.closest('[style*=fixed]').remove()">ЧЎЧ’Ч•ЧЁ</button></form></div>`;
  document.body.appendChild(m);
}
async function saveForm(e,id){
  e.preventDefault();
  let d=Object.fromEntries(new FormData(e.target));
  let row={name:d.name,phone:d.phone,username:d.username,street:d.street,house:d.house,floor:d.floor,apartment:d.apartment,entry_code:d.entry_code,delivery_note:d.delivery_note,admin_note:d.admin_note,paid:!!d.paid,active:!!d.active};
  row[secretCol]=d.pin;
  let r;
  if(id)r=await db.from('customers').update(row).eq('id',Number(id));
  else{row.subscription_id=nextId();row.skip_today=false;r=await db.from('customers').insert(row)}
  if(r.error){alert(r.error.message);return}
  document.querySelector('[style*=fixed]')?.remove();
  addNotice('ЧңЧ§Ч•Ч— Ч Ч©ЧһЧЁ',d.name);
  await load();
}
async function deleteCustomer(id){
  if(!confirm('ЧңЧһЧ—Ч•Ч§ ЧҗЧӘ Ч”ЧңЧ§Ч•Ч—?'))return;
  let r=await db.from('customers').delete().eq('id',id);
  if(r.error)alert(r.error.message);
  addNotice('ЧңЧ§Ч•Ч— Ч ЧһЧ—Ч§','Ч”ЧңЧ§Ч•Ч— Ч ЧһЧ—Ч§ ЧһЧ”ЧһЧўЧЁЧӣЧӘ.');
  await load();
}
async function togglePaid(id){let c=customers.find(x=>x.id===id);await db.from('customers').update({paid:!c.paid}).eq('id',id);addNotice('ЧӘЧ©ЧңЧ•Чқ ЧўЧ•Ч“ЧӣЧҹ',c.name);await load()}
async function toggleSkip(id){let c=customers.find(x=>x.id===id);await db.from('customers').update({skip_today:!c.skip_today}).eq('id',id);addNotice('ЧЎЧҳЧҳЧ•ЧЎ Ч”Ч–ЧһЧ Ч” ЧўЧ•Ч“ЧӣЧҹ',c.name);await load()}
window.addEventListener('online',()=>{addNotice('Ч—Ч–ЧЁЧӘ ЧңЧҗЧҷЧ ЧҳЧЁЧ Чҳ','Ч”Ч ЧӘЧ•Ч ЧҷЧқ ЧһЧЎЧӘЧ ЧӣЧЁЧ ЧҷЧқ.');load()});
window.addEventListener('offline',()=>addNotice('ЧҗЧҷЧҹ Ч—ЧҷЧ‘Ч•ЧЁ ЧңЧҗЧҷЧ ЧҳЧЁЧ Чҳ','ЧңЧҗ ЧңЧ‘ЧҰЧў Ч©ЧҷЧ Ч•ЧҷЧҷЧқ ЧўЧ“ Ч©Ч”Ч—ЧҷЧ‘Ч•ЧЁ Ч—Ч•Ч–ЧЁ.'));
load();
</script>
</body>
</html>
