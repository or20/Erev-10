<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111006">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ערב 10 מנהל">
<title>ערב 10 מנהל</title>
<link rel="manifest" href="./manifest-manager.webmanifest">
<link rel="stylesheet" href="./styles.css">
<style>
body{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}input,textarea{user-select:text;-webkit-user-select:text}
.credit{text-align:center;margin:22px 0 4px;font-size:12px}.credit a{color:var(--muted);text-decoration:none}
.bakery-msg{white-space:pre-line;line-height:1.6}.install-box{display:none;margin:14px 0}.install-box.show{display:block}
.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:9999;max-width:420px;margin:auto;background:rgba(18,14,7,.96);border:1px solid rgba(255,215,120,.32);border-radius:24px;padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.55)}.toast b{display:block;color:var(--gold);font-size:18px;margin-bottom:4px}
.bakery-state{font-weight:950;margin-bottom:12px}.manager-note{font-size:14px;line-height:1.55}
.filterbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}.filterbar button{border:1px solid rgba(255,215,120,.22);border-radius:16px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:900;padding:10px 5px}.filterbar button.on{background:linear-gradient(135deg,var(--gold),#ffe28a);color:#201500}
.mini-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.mini-actions a,.mini-actions button{display:block;text-align:center;border-radius:16px;border:1px solid rgba(255,215,120,.22);background:rgba(255,255,255,.06);color:var(--gold);font-weight:900;text-decoration:none;padding:10px 4px;font-size:14px}
.problem-card{border-color:rgba(255,70,70,.38)!important;background:rgba(255,70,70,.07)!important}.problem-title{color:#ff9b9b;font-weight:950}.problem-pill{display:inline-block;border-radius:999px;padding:6px 10px;border:1px solid rgba(255,70,70,.38);color:#ff9b9b;font-weight:900;margin-top:7px;font-size:13px}
.good-card{border-color:rgba(37,211,102,.38)!important;background:rgba(37,211,102,.07)!important}
</style>
</head>
<body>
<main id="manager-app" class="app-shell"></main><div id="ui"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
<script>
if(sessionStorage.getItem('e10ok')!=='1'){let c=prompt('קוד כניסה לניהול');if(c!==['1','0','1','0'].join('')){document.querySelector('#manager-app').innerHTML='<section class="screen"><h1 class="top-title">אין גישה</h1><div class="card">קוד לא נכון</div></section>';throw new Error('locked')}sessionStorage.setItem('e10ok','1')}
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});
let installEvent=null,bakeryTimer=null,currentFilter='all';window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installEvent=e;showInstall()});
const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY),app=document.querySelector('#manager-app'),ui=document.querySelector('#ui');
let customers=[],bakeryOrder=null;const secretCol=['pass','word'].join('');
function safe(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('"','&quot;')}function digits(v){return String(v||'').replace(/\D/g,'')}
function todayLocal(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function address(c){return `${c.street||''} ${c.house||''}, קומה ${c.floor||'-'}, דירה ${c.apartment||'-'}`}function active(){return customers.filter(c=>c.active)}function paused(){return customers.filter(c=>c.active===false)}
function skipped(){return active().filter(c=>c.skip_today)}function delivery(){return active().filter(c=>!c.skip_today)}function unpaid(){return active().filter(c=>!c.paid)}function problems(){return customers.filter(c=>c.delivery_status==='בעיה')}
function buns(){return delivery().length*10}function delivered(){return customers.filter(c=>c.delivery_status==='נמסר')}function openDeliveries(){return delivery().filter(c=>!c.delivery_status||c.delivery_status==='ממתין')}function expectedIncome(){return delivery().length*22}function monthlyIncome(){return active().length*22*22}
function clientLink(){return location.origin+location.pathname.replace('manager.html','client-v3.html').replace('manager-full-v6-bakery.html','client-v3.html')}function copy(t,m){navigator.clipboard?.writeText(t);toast('הועתק',m||'')}
function nowMin(){let d=new Date();return d.getHours()*60+d.getMinutes()}function countdownTo(t){let n=nowMin(),left=Math.max(0,t-n),h=Math.floor(left/60),m=left%60;if(left<=0)return'';return`${h?h+' שעות ו־':''}${m} דקות`}
function countdownToHour(hour){let d=new Date(),target=new Date();target.setHours(hour,0,0,0);let left=Math.max(0,target-d),h=Math.floor(left/3600000),m=Math.floor((left%3600000)/60000);return left<=0?'הזמן הגיע':`${h?h+' שעות ו־':''}${m} דקות`}
function nextId(){let nums=customers.map(c=>Number(String(c.subscription_id||'').replace('E10-',''))||0).filter(Boolean).sort((a,b)=>a-b);let n=1;for(let x of nums){if(x===n)n++;else if(x>n)break}return'E10-'+String(n).padStart(4,'0')}
function toast(t,s){ui.innerHTML=`<div class="toast"><b>${t}</b><p class="muted">${s||''}</p><button class="cta secondary" onclick="ui.innerHTML=''">סגור</button></div>`;setTimeout(()=>ui.innerHTML='',3200)}
function bakeryOrderText(){return`שלום, להערב צריך להכין ${buns()} לחמניות עבור ערב 10.\nלקוחות למשלוח: ${delivery().length}\nלקוחות פעילים: ${active().length}\nביטלו היום: ${skipped().length}\nלא שילמו: ${unpaid().length}`}
function showBakeryOrder(){let msg=bakeryOrder?.message||bakeryOrderText();ui.innerHTML=`<div class="toast"><b>מה נשלח למאפייה</b><p class="muted bakery-msg">${safe(msg)}</p><button class="cta" onclick="copyBakeryOrder()">העתק הודעה</button><button class="cta secondary" onclick="ui.innerHTML=''">סגור</button></div>`}
function copyBakeryOrder(){navigator.clipboard?.writeText(bakeryOrder?.message||bakeryOrderText());toast('הועתק','ההודעה למאפייה הועתקה.')}
async function load(){app.innerHTML='<section class="screen"><h1 class="top-title">טוען לקוחות...</h1></section>';let r=await db.from('customers').select('*').order('id',{ascending:true});if(r.error){app.innerHTML=`<section class="screen"><h1 class="top-title">שגיאה</h1><div class="card">${safe(r.error.message)}</div></section>`;return}customers=r.data||[];let b=await db.from('bakery_orders').select('*').eq('order_date',todayLocal()).maybeSingle();bakeryOrder=b.error?null:b.data;render()}
function installBox(){return`<div id="installBox" class="card install-box"><p class="muted">רוצה שהמנהל יהיה במסך הבית?</p><button class="cta" onclick="installApp()">התקן את מנהל ערב 10</button><p class="muted" style="font-size:13px">בחר “התקנה” ולא “יצירת קיצור דרך”.</p></div>`}
function showInstall(){setTimeout(()=>{let b=document.getElementById('installBox');if(b&&installEvent)b.classList.add('show')},100)}async function installApp(){if(!installEvent){toast('התקנה ידנית','פתח בתפריט הדפדפן ובחר “התקנה”.');return}installEvent.prompt();await installEvent.userChoice;installEvent=null;let b=document.getElementById('installBox');if(b)b.classList.remove('show')}
function render(){let u=unpaid().length,s=skipped().length,p=problems().length;app.innerHTML=`<section class="screen"><h1 class="top-title">ניהול ערב 10</h1>${installBox()}<div class="small-card" style="margin-bottom:16px;font-weight:900">${p?'🔴 '+p+' בעיות דורשות טיפול':s?'🟡 '+s+' ביטלו להיום':u?'🟠 '+u+' לא שילמו':'🟢 המערכת מוכנה לערב'}</div><div class="stats"><div class="stat"><span>לקוחות פעילים</span><strong>${active().length}</strong></div><div class="stat"><span>ביטלו היום</span><strong>${s}</strong></div><div class="stat"><span>לא שילמו</span><strong>${u}</strong></div><div class="stat"><span>לחמניות</span><strong>${buns()}</strong></div></div><div class="stats" style="margin-top:12px"><div class="stat"><span>משלוחים היום</span><strong>${delivery().length}</strong></div><div class="stat"><span>נמסרו</span><strong>${delivered().length}</strong></div><div class="stat"><span>פתוחים</span><strong>${openDeliveries().length}</strong></div><div class="stat"><span>בעיות היום</span><strong>${p}</strong></div><div class="stat"><span>צפי יומי</span><strong>₪${expectedIncome()}</strong></div><div class="stat"><span>צפי חודשי</span><strong>₪${monthlyIncome()}</strong></div></div>${problemsCard()}${bakeryStatusCard()}${bakeryCard()}<button class="cta secondary" onclick="openForm()">➕ הוסף לקוח</button><button class="cta secondary" onclick="location.href='./courier.html'">פתח שליח</button><button class="cta secondary" onclick="location.href='./client-v3.html'">פתח לקוח</button><button class="cta secondary" onclick="location.href='./bakery.html'">פתח מאפייה</button><h2 class="section-title">לקוחות</h2><input placeholder="חיפוש לקוח" oninput="filterCustomers(this.value)" id="searchBox"><div class="filterbar">${filterBtn('all','כולם')}${filterBtn('delivery','למשלוח')}${filterBtn('problems','בעיות')}${filterBtn('skipped','ביטלו')}${filterBtn('unpaid','לא שילמו')}${filterBtn('paused','מוקפאים')}</div><div id="customers-list" class="grid" style="margin-top:16px"></div><div class="credit"><a href="https://share.google/HUoheAjuVnUKozsP8">מבית zagzagwebs</a></div><div class="muted" style="font-size:12px;text-align:center;margin-top:8px">גרסה 2.6 · מנהל מסונכרן מאפייה</div></section>`;filterCustomers('');showInstall();startBakeryTimer()}
function fmt(t){if(!t)return'—';return new Date(t).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}
function bakeryStatusCard(){let o=bakeryOrder;if(!o)return`<div class="card" style="margin:16px 0"><h2 style="color:var(--gold);margin-top:0">🥖 התקדמות מאפייה</h2><div class="small-card bakery-state">ממתין להזמנה</div><p class="muted">בשעה 13:00 תיווצר הזמנה למאפייה.</p></div>`;let cls=o.status==='מוכנה'?'good-card':o.status==='התקבלה'?'good-card':'';return`<div class="card ${cls}" style="margin:16px 0"><h2 style="color:var(--gold);margin-top:0">🥖 התקדמות מאפייה</h2><div class="small-card bakery-state">${o.status==='מוכנה'?'✅ ההזמנה מוכנה':o.status==='התקבלה'?'🟢 המאפייה קיבלה את ההזמנה':'🔔 נשלח למאפייה — ממתין לאישור'}</div><div class="stats" style="margin:12px 0"><div class="stat"><span>לחמניות</span><strong>${o.buns_count}</strong></div><div class="stat"><span>לקוחות</span><strong>${o.customers_count}</strong></div></div><p class="muted">נשלח: ${fmt(o.sent_at)} · התקבל: ${fmt(o.received_at)} · מוכן: ${fmt(o.ready_at)}</p>${o.status==='התקבלה'?`<p class="muted">נותרו עד 18:00: <b>${countdownToHour(18)}</b></p>`:''}</div>`}
function problemsCard(){let p=problems();if(!p.length)return'';return`<div class="card problem-card" style="margin:16px 0"><h2 style="color:#ff9b9b;margin-top:0">🔴 בעיות היום</h2>${p.map(c=>`<div class="small-card" style="margin-top:10px"><b>${safe(c.name)}</b><br><span class="muted">${safe(c.subscription_id)} · ${safe(address(c))}</span>${problemBlock(c)}</div>`).join('')}</div>`}
function problemBlock(c){if(c.delivery_status!=='בעיה')return'';return`<div class="small-card problem-card" style="margin-top:10px"><div class="problem-title">🔴 בעיה במשלוח</div><div class="muted">סיבה: ${safe(c.delivery_problem_reason||'בעיה')}</div>${c.delivery_problem_time?`<div class="muted">שעה: ${safe(c.delivery_problem_time)}</div>`:''}${c.delivery_problem_note?`<div class="muted">הערה: ${safe(c.delivery_problem_note)}</div>`:''}<button class="cta secondary" style="margin-top:10px" onclick="markProblemHandled(${c.id})">סמן טופל</button></div>`}
async function markProblemHandled(id){let r=await db.from('customers').update({delivery_status:null,delivery_problem_reason:null,delivery_problem_note:null,delivery_problem_time:null,delivery_handled_at:new Date().toISOString()}).eq('id',id);if(r.error){toast('שגיאה',r.error.message);return}toast('טופל','הבעיה סומנה כטופלה.');await load()}
function filterBtn(k,t){return`<button class="${currentFilter===k?'on':''}" onclick="setFilter('${k}')">${t}</button>`}function setFilter(k){currentFilter=k;render()}
function bakeryCard(){let n=nowMin(),phase='',note='';if(n<720){phase=`<div class="small-card bakery-state">🟢 פתוח לשינויים</div>`;note=`<p id="bakeryNote" class="muted manager-note">ניתן לבצע שינויים עד <b>12:00</b>.<br>נותרו ${countdownTo(720)} לשינויים.<br>בשעה <b>13:00</b> ההזמנה תישלח אוטומטית למאפייה.</p>`}else if(n<780){phase=`<div class="small-card bakery-state">🟠 ההזמנה נסגרה</div>`;note=`<p id="bakeryNote" class="muted manager-note">השינויים נסגרו ב־<b>12:00</b>.<br>נותרו ${countdownTo(780)} עד שליחה אוטומטית ב־<b>13:00</b>.</p>`}else{phase=`<div class="small-card bakery-state">🔵 נשלח למאפייה אוטומטית</div>`;note=`<p class="muted manager-note">ההזמנה ננעלה ונשלחה למאפייה אוטומטית בשעה <b>13:00</b>.</p>`}return`<div class="card" style="margin:16px 0"><h2 style="color:var(--gold);margin-top:0">🥖 סטטוס הזמנה</h2>${phase}${note}<div class="stats" style="margin:12px 0"><div class="stat"><span>לקוחות למשלוח</span><strong>${delivery().length}</strong></div><div class="stat"><span>לחמניות</span><strong>${buns()}</strong></div></div><button class="cta" onclick="showBakeryOrder()">מה נשלח למאפייה</button></div>`}
function startBakeryTimer(){clearInterval(bakeryTimer);bakeryTimer=setInterval(load,30000)}
function filteredRows(q){q=String(q||'').trim();let rows=customers.filter(c=>(c.name||'').includes(q)||(c.phone||'').includes(q)||(c.subscription_id||'').includes(q)||address(c).includes(q)||(c.username||'').includes(q));if(currentFilter==='paused')rows=rows.filter(c=>c.active===false);if(currentFilter==='delivery')rows=rows.filter(c=>c.active&&!c.skip_today);if(currentFilter==='problems')rows=rows.filter(c=>c.delivery_status==='בעיה');if(currentFilter==='skipped')rows=rows.filter(c=>c.active&&c.skip_today);if(currentFilter==='unpaid')rows=rows.filter(c=>c.active&&!c.paid);return rows}
function filterCustomers(q){let list=document.querySelector('#customers-list');let rows=filteredRows(q);list.innerHTML=rows.map(c=>card(c)).join('')||'<div class="small-card">אין לקוחות להצגה</div>'}
function card(c){let phone=digits(c.phone),wa=phone?`https://wa.me/972${phone.replace(/^0/,'')}`:'#',waze=`https://waze.com/ul?q=${encodeURIComponent(address(c))}`,p=c.delivery_status==='בעיה';return`<div class="small-card ${p?'problem-card':''}"><div class="client-row"><div><b>${safe(c.name)}</b><br><span class="muted">${safe(c.subscription_id)} · ${safe(address(c))}</span><br><span class="muted">${safe(c.phone||'')}</span>${c.active===false?'<br><span style="color:#ff9b9b">מנוי עצור</span>':''}${p?`<br><span class="problem-pill">🔴 ${safe(c.delivery_problem_reason||'בעיה')}</span>`:''}</div><span class="status ${p?'bad':c.active===false?'bad':c.skip_today?'wait':c.paid?'ok':'bad'}">${p?'בעיה':c.active===false?'עצור':c.skip_today?'היום לא':c.paid?'שולם':'לא שולם'}</span></div>${problemBlock(c)}<div class="grid" style="grid-template-columns:1fr 1fr;margin-top:12px"><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="openForm(${c.id})">ערוך</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="togglePaid(${c.id})">${c.paid?'לא שולם':'שולם'}</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="toggleSkip(${c.id})">${c.skip_today?'בטל היום לא':'היום לא'}</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="copy('${clientLink()}','קישור לקוח הועתק')">קישור</button></div><div class="mini-actions"><a href="tel:${safe(c.phone||'')}">חיוג</a><a href="${wa}" target="_blank">ווטסאפ</a><a href="${waze}" target="_blank">Waze</a><button onclick="copy('${safe(address(c))}','כתובת הועתקה')">העתק כתובת</button></div></div>`}
function fields(c={}){return`<label>שם מלא<input name="name" required value="${safe(c.name)}"></label><label>טלפון<input name="phone" value="${safe(c.phone)}"></label><label>שם משתמש<input name="username" required value="${safe(c.username)}"></label><label>קוד אישי<input name="pin" required value="${safe(c[secretCol])}"></label><label>רחוב<input name="street" value="${safe(c.street)}"></label><label>מספר בית<input name="house" value="${safe(c.house)}"></label><label>קומה<input name="floor" value="${safe(c.floor)}"></label><label>דירה<input name="apartment" value="${safe(c.apartment)}"></label><label>קוד כניסה<input name="entry_code" value="${safe(c.entry_code)}"></label><label>הערה לשליח<textarea name="delivery_note">${safe(c.delivery_note)}</textarea></label><label>הערת מנהל<textarea name="admin_note">${safe(c.admin_note)}</textarea></label>`}
function openForm(id=''){let c=customers.find(x=>x.id===id),m=document.createElement('div');m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:10000;padding:22px;overflow:auto;direction:rtl';m.innerHTML=`<div class="card" style="max-width:520px;margin:0 auto"><h1 class="top-title">${c?'עריכת לקוח':'הוספת לקוח'}</h1><form class="form" onsubmit="saveForm(event,'${id}')">${fields(c||{})}<label class="small-card" style="display:flex;gap:12px;align-items:center;color:var(--text)"><input type="checkbox" name="paid" ${c?.paid?'checked':''} style="width:26px;height:26px;min-width:26px"> שולם</label><label class="small-card" style="display:flex;gap:12px;align-items:center;color:var(--text)"><input type="checkbox" name="active" ${c?(c.active?'checked':''):'checked'} style="width:26px;height:26px;min-width:26px"> מנוי פעיל</label><button class="cta" type="submit">שמור</button>${c?`<button class="cta secondary" type="button" onclick="deleteCustomer(${c.id})">מחק לקוח</button>`:''}<button class="cta secondary" type="button" onclick="this.closest('[style*=fixed]').remove()">סגור</button></form></div>`;document.body.appendChild(m)}
async function saveForm(e,id){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let row={name:d.name,phone:d.phone,username:d.username,street:d.street,house:d.house,floor:d.floor,apartment:d.apartment,entry_code:d.entry_code,delivery_note:d.delivery_note,admin_note:d.admin_note,paid:!!d.paid,active:!!d.active};row[secretCol]=d.pin;let r;if(id)r=await db.from('customers').update(row).eq('id',Number(id));else{row.subscription_id=nextId();row.skip_today=false;r=await db.from('customers').insert(row)}if(r.error){alert(r.error.message);return}document.querySelector('[style*=fixed]')?.remove();await load()}
async function deleteCustomer(id){if(!confirm('למחוק את הלקוח?'))return;let r=await db.from('customers').delete().eq('id',id);if(r.error)alert(r.error.message);await load()}async function togglePaid(id){let c=customers.find(x=>x.id===id);await db.from('customers').update({paid:!c.paid}).eq('id',id);await load()}async function toggleSkip(id){let c=customers.find(x=>x.id===id);await db.from('customers').update({skip_today:!c.skip_today}).eq('id',id);await load()}
load();
</script>
</body>
</html>
