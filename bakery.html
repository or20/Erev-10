<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#111006">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ערב 10 מאפייה">
<title>ערב 10 מאפייה</title>
<link rel="manifest" href="./manifest-bakery.webmanifest">
<link rel="stylesheet" href="./styles.css">
<style>
body{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.credit{text-align:center;margin:22px 0 4px;font-size:12px}.credit a{color:var(--muted);text-decoration:none}
.install-box{display:none;margin:14px 0}.install-box.show{display:block}
.installFab{position:fixed;right:14px;bottom:14px;z-index:55;border:1px solid rgba(255,215,120,.32);border-radius:999px;background:rgba(18,14,7,.94);color:var(--gold);font-weight:950;padding:12px 16px;box-shadow:0 14px 45px rgba(0,0,0,.42)}
.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:9999;max-width:440px;margin:auto;background:rgba(18,14,7,.96);border:1px solid rgba(255,215,120,.32);border-radius:24px;padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.55)}
.toast b{display:block;color:var(--gold);font-size:18px;margin-bottom:4px}
.bigCount{font-size:78px;line-height:.95;color:var(--gold);font-weight:950;text-align:center;margin:14px 0}
.state{font-size:22px;font-weight:950;text-align:center;margin:12px 0}
.state.wait{color:var(--gold)}.state.ok{color:#7df0a4}.state.ready{color:#7df0a4}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.summary .stat{min-height:92px}
.sync{text-align:center;font-size:13px;color:#7df0a4;font-weight:950;margin:8px 0}
.orderText{white-space:pre-line;line-height:1.6}
.actionGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.log{font-size:13px;color:var(--muted);line-height:1.6}
@media(max-width:420px){.actionGrid{grid-template-columns:1fr}.bigCount{font-size:64px}}
</style>
</head>
<body>
<main id="bakery-app" class="app-shell"></main><div id="ui"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>
<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});
let installEvent=null,order=null,lastSync=new Date(),timer=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installEvent=e;showInstall()});
window.addEventListener('appinstalled',()=>{localStorage.setItem('e10_bakery_installed','1');toast('האפליקציה הותקנה','מאפיית ערב 10 נוספה למסך הבית.');render()});

const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY);
const app=document.querySelector('#bakery-app'),ui=document.querySelector('#ui');

function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;')}
function todayLocal(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmt(t){if(!t)return'—';return new Date(t).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}
function toast(t,s){ui.innerHTML=`<div class="toast"><b>${esc(t)}</b><p class="muted">${esc(s||'')}</p><button class="cta secondary" onclick="ui.innerHTML=''">סגור</button></div>`;setTimeout(()=>ui.innerHTML='',3200)}
function isStandalone(){return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true}
function installBox(){if(isStandalone()||localStorage.getItem('e10_bakery_installed')==='1')return'';return`<div id="installBox" class="card install-box"><h2 style="color:var(--gold);margin-top:0">📲 התקנת אפליקציית מאפייה</h2><p class="muted">מומלץ להתקין את מסך המאפייה למסך הבית.</p><button class="cta" onclick="installApp()">התקן אפליקציה</button><p class="muted" style="font-size:13px">באנדרואיד לבחור “התקנה”. באייפון: שיתוף → הוסף למסך הבית.</p></div>`}
function installFab(){if(isStandalone()||localStorage.getItem('e10_bakery_installed')==='1')return'';return`<button class="installFab" onclick="installApp()">📲 התקן</button>`}
function showInstall(){setTimeout(()=>{let b=document.getElementById('installBox');if(b&&!isStandalone())b.classList.add('show')},100)}
async function installApp(){if(!installEvent){toast('התקנה ידנית','באנדרואיד פתח תפריט ובחר “התקנה”. באייפון: שיתוף → הוסף למסך הבית.');return}installEvent.prompt();let c=await installEvent.userChoice;installEvent=null;if(c&&c.outcome==='accepted')localStorage.setItem('e10_bakery_installed','1');render()}

async function load(){
  app.innerHTML='<section class="screen"><h1 class="top-title">טוען הזמנה...</h1></section>';
  let r=await db.from('bakery_orders').select('*').eq('order_date',todayLocal()).maybeSingle();
  if(r.error){app.innerHTML=`<section class="screen"><h1 class="top-title">שגיאה</h1><div class="card">${esc(r.error.message)}</div></section>`;return}
  order=r.data||null;
  lastSync=new Date();
  render();
}
function statusLabel(){
  if(!order)return['ממתין להזמנה','wait'];
  if(order.status==='מוכנה')return['✅ ההזמנה מוכנה','ready'];
  if(order.status==='התקבלה')return['🟢 ההזמנה התקבלה במאפייה','ok'];
  return['🔔 הזמנה חדשה ממתינה לאישור','wait'];
}
async function updateStatus(status){
  if(!order)return toast('אין הזמנה','עדיין לא נוצרה הזמנה להיום.');
  let now=new Date().toISOString(),row={status};
  if(status==='התקבלה')row.received_at=now;
  if(status==='מוכנה')row.ready_at=now;
  let r=await db.from('bakery_orders').update(row).eq('id',order.id).select('*').single();
  if(r.error)return toast('שגיאה',r.error.message);
  order=r.data;lastSync=new Date();
  toast('הסטטוס עודכן',status);
  render();
}
function orderMessage(){
  if(!order)return'עדיין אין הזמנה להיום.';
  return order.message||`להכין ${order.buns_count||0} לחמניות עבור ${order.customers_count||0} לקוחות.`;
}
function render(){
  let [label,cls]=statusLabel();
  if(!order){
    app.innerHTML=`${installFab()}<section class="screen"><h1 class="top-title">מאפיית ערב 10</h1>${installBox()}<div class="sync">עודכן ${lastSync.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}</div><div class="card"><div class="state wait">ממתין להזמנה</div><p class="muted">הזמנת היום עדיין לא נוצרה או לא נשלחה.</p><button class="cta secondary" onclick="load()">רענן</button></div><div class="credit"><a href="https://share.google/HUoheAjuVnUKozsP8">מבית zagzagwebs</a></div></section>`;
    showInstall();return;
  }
  app.innerHTML=`${installFab()}<section class="screen">
    <h1 class="top-title">מאפיית ערב 10</h1>
    ${installBox()}
    <div class="sync">✅ מסונכרן מול המנהל · ${lastSync.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}</div>
    <div class="card">
      <div class="state ${cls}">${label}</div>
      <p class="muted" style="text-align:center">לחמניות להכנה</p>
      <div class="bigCount">${order.buns_count||0}</div>
      <div class="summary">
        <div class="stat"><span>לקוחות</span><strong>${order.customers_count||0}</strong></div>
        <div class="stat"><span>תאריך</span><strong>${esc(order.order_date||todayLocal())}</strong></div>
      </div>
    </div>

    <div class="card">
      <h2 style="color:var(--gold);margin-top:0">פרטי ההזמנה</h2>
      <p class="orderText">${esc(orderMessage())}</p>
      <div class="log">
        נשלח: ${fmt(order.sent_at)}<br>
        התקבל: ${fmt(order.received_at)}<br>
        מוכן: ${fmt(order.ready_at)}
      </div>
    </div>

    <div class="card">
      <h2 style="color:var(--gold);margin-top:0">פעולות</h2>
      <div class="actionGrid">
        <button class="cta" onclick="updateStatus('התקבלה')">קיבלתי את ההזמנה</button>
        <button class="cta" onclick="updateStatus('מוכנה')">ההזמנה מוכנה</button>
        <button class="cta secondary" onclick="load()">רענן מהשרת</button>
        <button class="cta secondary" onclick="navigator.clipboard?.writeText(orderMessage());toast('הועתק','פרטי ההזמנה הועתקו')">העתק הזמנה</button>
      </div>
    </div>

    <div class="credit"><a href="https://share.google/HUoheAjuVnUKozsP8">מבית zagzagwebs</a></div>
    <div class="muted" style="font-size:12px;text-align:center;margin-top:8px">גרסה 1.1 · קבלה · מוכנות · סנכרון</div>
  </section>`;
  showInstall();
}
window.addEventListener('online',load);
timer=setInterval(load,30000);
load();
</script>
</body>
</html>
