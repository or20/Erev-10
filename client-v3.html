</style></head><body><main id="app" class="app-shell"></main><div id="ui"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script><script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});
let installEvent=null,statusTimer=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installEvent=e;showInstall()});

const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY),app=document.querySelector('#app'),ui=document.querySelector('#ui'),STORE='e10_client_id',keyName=['pass','word'].join('');
let me=null,draftToday=null,draftPlan=null,draftDays=null,changed=false,ordersToday=0,lastSync=new Date(),saving=false,notices=[];const DAILY_LIMIT=50,SERVICE_STREET='ניב דוד';

function clean(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;')}
function timeAgo(){let s=Math.max(0,Math.floor((new Date()-lastSync)/1000));if(s<10)return 'עכשיו';if(s<60)return `לפני ${s} שניות`;let m=Math.floor(s/60);return `לפני ${m} דקות`}
function cloudText(extra){return navigator.onLine?`✅ נשמר בענן · עודכן ${timeAgo()}${extra? ' · '+extra:''}`:'📶 אין חיבור לאינטרנט · השינוי יישמר כשיחזור החיבור'}
function addNotice(t,s){notices.unshift({t,s,ts:new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})});notices=notices.slice(0,8)}
function bell(){return `<button class="bell" onclick="openNotices()">🔔${notices.length?`<i>${notices.length}</i>`:''}</button>`}
function openNotices(){ui.innerHTML=`<div class="panel"><h3>🔔 התראות</h3>${notices.length?notices.map(n=>`<div class="notice"><b>${clean(n.t)}</b><br><span class="muted">${clean(n.s||'')}</span><br><small class="muted">${n.ts}</small></div>`).join(''):'<p class="muted">אין התראות חדשות כרגע.</p>'}<button class="cta secondary" onclick="ui.innerHTML='';notices=[];screen()">סגור</button></div>`}
function orderFlow(){
  let n=nowMin(),ok=todayWanted();let level=0;
  if(ok)level=1;
  if(ok&&n>=780)level=2;
  if(ok&&n>=1080)level=3;
  if(ok&&n>=1110)level=4;
  return `<div class="flow">
    <div class="step ${level>=1?'on':''}">🟢 נקלטה</div>
    <div class="step ${level>=2?'on':''}">🥖 מאפייה</div>
    <div class="step ${level>=3?'on':''}">🚗 שליח</div>
    <div class="step ${level>=4?'on':''}">✅ נמסרה</div>
    <div class="step">📷 תיעוד</div>
  </div>`
}
function copyAddress(){navigator.clipboard?.writeText(addr(me));toast('הכתובת הועתקה','אפשר להדביק לשליח או בשירות הלקוחות.')}
function specialOrder(){location.href='https://wa.me/972527257775?text='+encodeURIComponent('היי, אני מעוניין להזמין יותר מ-10 לחמניות')}
function help(){location.href='https://wa.me/972527257775?text='+encodeURIComponent('היי אשמח לעזרה באפליקציה')}
function joinedDays(){try{return Math.max(1,Math.floor((new Date()-new Date(me.created_at||Date.now()))/86400000))}catch(e){return 1}}
function streak(){return Math.max(1,Math.min(30,joinedDays()))}
window.addEventListener('online',()=>{addNotice('חזרת לאינטרנט','המסך יסונכרן מחדש.');refresh()});
window.addEventListener('offline',()=>addNotice('אין חיבור לאינטרנט','לא לבצע שינויים עד שהחיבור חוזר.'));
function norm(v){return String(v||'').replace(/\s+/g,' ').trim()}
function addr(c){return `${c.street||''} ${c.house||''}, קומה ${c.floor||'-'}, דירה ${c.apartment||'-'}`}
function dIndex(){return new Date().getDay()}
function dayName(){return ['ראשון','שני','שלישי','רביעי','חמישי','שישי','מוצ״ש'][dIndex()]}
function noFriday(){return dIndex()!==5}
function planKey(){return 'e10_plan_'+me.id}
function daysKey(){return 'e10_days_'+me.id}
function initKey(){return 'e10_initialized_'+me.id}
function storedPlan(){return localStorage.getItem(planKey())||'daily'}
function storedDays(){let v=localStorage.getItem(daysKey());return v?v.split(','):['0','1','2','3','4','6']}function oneTimeKey(){return 'e10_one_time_'+me.id}
function todayDate(){let d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function hasOneTimeToday(){return localStorage.getItem(oneTimeKey())===todayDate()}
function setOneTimeToday(on){if(on)localStorage.setItem(oneTimeKey(),todayDate());else localStorage.removeItem(oneTimeKey())}

function currentPlan(){return draftPlan||storedPlan()}
function currentDays(){return draftDays||storedDays()}
function label(){return {daily:'כל ערב',custom:'ימים קבועים',manual:'רק לפי הזמנה'}[currentPlan()]||'כל ערב'}
function baseWanted(){let p=currentPlan();if(!noFriday())return false;if(hasOneTimeToday())return !me.skip_today;if(p==='manual')return !me.skip_today;if(p==='custom'){return currentDays().includes(String(dIndex()))&&!me.skip_today}return !me.skip_today}return !me.skip_today}
function todayWanted(){return draftToday===null?baseWanted():draftToday}
function inServiceArea(){return norm(me?.street).includes(SERVICE_STREET)}
function spotsLeft(){return Math.max(0,DAILY_LIMIT-ordersToday)}
function limitFull(){return ordersToday>=DAILY_LIMIT&&!todayWanted()}
async function loadOrdersCount(){let r=await db.from('customers').select('id').eq('active',true).eq('skip_today',false);if(!r.error)ordersToday=(r.data||[]).length}

function nowMin(){let d=new Date();return d.getHours()*60+d.getMinutes()}
function canOrderNow(){let n=nowMin();return n<720||n>=1260}
function afterNine(){return nowMin()>=1260}
function locked(){return !canOrderNow()}
function orderWord(){return afterNine()?'למחר':'היום'}
function countdown(){
  let n=nowMin(),left=Math.max(0,720-n),h=Math.floor(left/60),m=left%60;
  if(left<=0)return '';
  return `⏳ נותרו ${h? h+' שעות ו־':''}${m} דקות לבצע שינויים להיום`;
}
function statusText(ok){
  let n=nowMin();
  if(!inServiceArea())return {title:'📍 השירות כרגע רק ברחוב ניב דוד',note:'אנחנו מתחילים בצורה מסודרת באזור אחד כדי לתת שירות מדויק ומהיר. בקרוב נתרחב לעוד רחובות.'};
  if(!noFriday())return {title:'❌ אין חלוקה היום',note:'אין משלוחים ביום שישי.'};
  if(limitFull())return {title:'🔒 ההזמנות מלאות',note:'הגענו למכסה של 50 הזמנות. אם יתפנה מקום עד 12:00, ניתן יהיה להצטרף.'};
  if(n<720)return ok
    ? {title:'🥖 ההזמנה שלך להיום מאושרת',note:countdown()}
    : {title:'❌ אין לך הזמנה להיום',note:'אם תרצה להצטרף למשלוח של היום, לחץ על “אני רוצה היום” לפני 12:00.\n'+countdown()};
  if(n<780)return ok
    ? {title:'🔒 ההזמנה שלך להיום נסגרה',note:'ההזמנה מאושרת ותישלח למאפייה בשעה 13:00.'}
    : {title:'❌ אין לך הזמנה להיום',note:'ההזמנה להיום נסגרה בשעה 12:00. ניתן להזמין למחר החל מהשעה 21:00.'};
  if(n<1260)return ok
    ? {title:'🥖 ההזמנה שלך נשלחה למאפייה',note:'המשלוח יגיע היום בין 18:30–20:00.'}
    : {title:'❌ אין לך הזמנה להיום',note:'ההזמנה להיום נסגרה. ניתן להזמין למחר החל מהשעה 21:00.'};
  return ok
    ? {title:'🥖 ההזמנה שלך למחר מאושרת',note:'ההזמנה נקלטה למחר. אפשר לשנות עד 12:00 בצהריים.'}
    : {title:'❌ אין לך הזמנה למחר',note:'חלון ההזמנות פתוח עכשיו עד 12:00 בצהריים. לחץ על “אני רוצה למחר” כדי להצטרף.'};
}
function updateStatusOnly(){
  if(!me)return;
  let ok=todayWanted(),st=statusText(ok),isLocked=locked()||!inServiceArea()||limitFull();
  let title=document.getElementById('statusTitle'),note=document.getElementById('statusNote'),spots=document.getElementById('spotsLeft'),cloud=document.getElementById('cloudState');
  let yes=document.getElementById('yesBtn'),no=document.getElementById('noBtn');
  if(title)title.innerHTML=st.title;
  if(note)note.innerHTML=clean(st.note).replaceAll('\n','<br>');
  if(spots)spots.innerHTML=`נותרו ${spotsLeft()} מקומות מתוך ${DAILY_LIMIT} להיום`;if(cloud)cloud.innerHTML=saving?'⏳ שומר בענן...':cloudText();
  if(yes){yes.className=`cta yes ${ok?'chosen':''} ${isLocked?'lockedBtn':''}`;}
  if(no){no.className=`cta no ${!ok?'chosen':''} ${locked()?'lockedBtn':''}`;}
}
function startStatusTimer(){
  clearInterval(statusTimer);
  statusTimer=setInterval(async()=>{await loadOrdersCount();updateStatusOnly()},30000);
}

function toast(t,s){ui.innerHTML=`<div class="toast"><b>${t}</b><p class="muted">${s||''}</p><button class="cta secondary" onclick="ui.innerHTML=''">סגור</button></div>`;setTimeout(()=>ui.innerHTML='',3000)}
function resetDraft(){draftToday=null;draftPlan=null;draftDays=null;changed=false}

async function start(){let id=localStorage.getItem(STORE);if(!id)return loginScreen();let r=await db.from('customers').select('*').eq('id',Number(id)).single();if(r.error||!r.data){localStorage.removeItem(STORE);return loginScreen()}me=r.data;await ensureDefault();await loadOrdersCount();resetDraft();screen()}
async function ensureDefault(){if(localStorage.getItem(initKey())==='1')return;localStorage.setItem(planKey(),'daily');localStorage.setItem(initKey(),'1');me.skip_today=false;await db.from('customers').update({skip_today:false}).eq('id',me.id)}
function loginScreen(){clearInterval(statusTimer);app.innerHTML=`<section class="screen"><h1 class="top-title">כניסה לערב 10</h1><div class="card"><form class="form" onsubmit="login(event)"><label>טלפון<input name="phone" required inputmode="tel"></label><label>קוד אישי<input name="p" required inputmode="numeric" type="password"></label><button class="cta" type="submit">כניסה</button></form><button class="cta secondary" onclick="forgotCode()">שכחתי קוד</button></div><button class="cta secondary helpBtn" onclick="help()">עזרה?</button><div class="credit"><a href="https://share.google/HUoheAjuVnUKozsP8">מבית zagzagwebs</a></div></section>`;showInstall()}
async function login(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let ph=String(d.phone||'').replace(/\D/g,'');let r=await db.from('customers').select('*').eq('phone',ph).eq(keyName,d.p).maybeSingle();if(r.error)return toast('שגיאה',r.error.message);if(!r.data)return toast('לא הצלחנו להיכנס','טלפון או קוד אישי לא נכונים.');if(r.data.active===false)return toast('המנוי עצור','פנה אלינו להפעלה מחדש.');me=r.data;localStorage.setItem(STORE,String(me.id));await ensureDefault();await loadOrdersCount();resetDraft();screen()}
async function forgotCode(){let ph=prompt('הכנס מספר טלפון לאיפוס קוד');if(!ph)return;let r=await db.from('customers').select('id,name').eq('phone',String(ph).replace(/\D/g,'')).maybeSingle();if(r.data)return toast('נמצא לקוח','בשלב זה פנה לשירות הלקוחות לאיפוס קוד.');toast('לא נמצא לקוח','המספר לא קיים במערכת.')}
function out(){localStorage.removeItem(STORE);me=null;loginScreen()}
async function chooseToday(v){
  if(!inServiceArea())return toast('השירות כרגע רק ברחוב ניב דוד','אנחנו מתחילים באזור אחד ובהמשך נתרחב.');
  await loadOrdersCount();
  if(v&&limitFull())return toast('היום מלא','הגענו למכסה של 50 הזמנות להיום.');
  if(locked())return toast('חלון ההזמנות סגור','אפשר להזמין מ־21:00 בערב ועד 12:00 בצהריים.');
  saving=true;updateStatusOnly();
  let r=await db.from('customers').update({skip_today:!v}).eq('id',me.id).select('id,skip_today').single();
  saving=false;
  if(r.error){updateStatusOnly();return toast('שגיאה בשמירה',r.error.message);}
  me.skip_today=!v;
  if(v && currentPlan()==='custom' && !currentDays().includes(String(dIndex()))) setOneTimeToday(true);
  if(!v) setOneTimeToday(false);
  let fresh=await db.from('customers').select('*').eq('id',me.id).single();
  if(!fresh.error&&fresh.data)me=fresh.data;
  draftToday=null;
  changed=false;
  lastSync=new Date();
  await loadOrdersCount();
  addNotice(v?'הזמנה נקלטה':'הזמנה בוטלה',v?`ההזמנה שלך ל${orderWord()} נשמרה בענן.`:`סימנו שאין הזמנה ל${orderWord()}.`);
  screen();
  toast('נשמר בהצלחה',v?`ההזמנה שלך ל${orderWord()} נקלטה.`:`סימנו שאין הזמנה ל${orderWord()}.`);
}
function choosePlan(p){draftPlan=p;if(p==='manual')draftToday=false;if(p==='daily')draftToday=true;if(p==='custom'&&!draftDays)draftDays=currentDays();changed=true;screen()}
function toggleDay(d){let a=[...currentDays()],s=String(d);a=a.includes(s)?a.filter(x=>x!==s):[...a,s];draftPlan='custom';draftDays=a;changed=true;screen()}
async function saveAll(){
  if(!inServiceArea())return toast('השירות כרגע רק ברחוב ניב דוד','לא ניתן להזמין לכתובת מחוץ לאזור הפעילות הנוכחי.');
  await loadOrdersCount();
  if(todayWanted()&&limitFull())return toast('היום מלא','הגענו למכסה של 50 הזמנות להיום.');
  if(locked())return toast('חלון ההזמנות סגור','אפשר להזמין מ־21:00 בערב ועד 12:00 בצהריים.');
  let want=todayWanted();
  saving=true;updateStatusOnly();
  let r=await db.from('customers').update({skip_today:!want}).eq('id',me.id).select('id,skip_today').single();
  saving=false;
  if(r.error){updateStatusOnly();return toast('שגיאה',r.error.message);}
  me.skip_today=!want;
  let fresh=await db.from('customers').select('*').eq('id',me.id).single();if(!fresh.error&&fresh.data)me=fresh.data;
  if(draftPlan)localStorage.setItem(planKey(),draftPlan);
  if(draftDays)localStorage.setItem(daysKey(),draftDays.join(','));
  localStorage.setItem(initKey(),'1');
  await loadOrdersCount();
  resetDraft();
  lastSync=new Date();
  addNotice('העדכון נשמר','העדכון נקלט בענן ונשמר במערכת.');
  screen();
  toast('נשמר בהצלחה','העדכון נקלט במערכת.');
}
async function refresh(){let r=await db.from('customers').select('*').eq('id',me.id).single();if(!r.error&&r.data){me=r.data;await loadOrdersCount();resetDraft();lastSync=new Date();screen();toast('עודכן','הסטטוס רוענן.')}}
async function pauseSub(){if(!confirm('לעצור את המנוי עכשיו?'))return;let r=await db.from('customers').update({active:false,skip_today:true,admin_note:'הלקוח ביקש עצירת מנוי דרך האפליקציה'}).eq('id',me.id);if(r.error)return toast('שגיאה',r.error.message);localStorage.removeItem(STORE);loginScreen();toast('המנוי נעצר','הפרטים נשמרו אצלנו.')}

function daysBox(){let items=[['0','א'],['1','ב'],['2','ג'],['3','ד'],['4','ה'],['6','מוצ״ש']];return `<div class="days">${items.map(([i,n])=>`<button class="daybtn ${currentDays().includes(i)?'on':''}" onclick="event.stopPropagation();toggleDay(${i})">${n}</button>`).join('')}</div><p class="muted" style="font-size:13px;margin-top:10px">אין חלוקה ביום שישי. ביום שנבחר ברירת המחדל היא לקבל.</p>`}
function pcard(p,t,x){return `<div class="small-card plan ${currentPlan()===p?'on':''}" onclick="choosePlan('${p}')"><b>${t}</b><br><span class="muted">${x}</span>${p==='custom'?daysBox():''}</div>`}
function saveBox(){return changed?`<div class="savebar"><div style="color:var(--gold);font-weight:900;text-align:center;margin-bottom:7px;font-size:13px">יש שינויים שלא נשמרו</div><div class="save-actions"><button class="cta" onclick="saveAll()">שמור</button><button class="cta secondary" onclick="resetDraft();screen()">בטל</button></div></div>`:''}
function installBox(){return `<div id="installBox" class="card install-box"><p class="muted">רוצה שהאפליקציה תהיה במסך הבית?</p><button class="cta" onclick="installApp()">התקן את ערב 10</button><p class="muted" style="font-size:13px">בחר “התקנה” ולא “יצירת קיצור דרך”.</p></div>`}
function showInstall(){setTimeout(()=>{let b=document.getElementById('installBox');if(b&&installEvent)b.classList.add('show')},100)}
async function installApp(){if(!installEvent)return toast('התקנה ידנית','פתח בתפריט הדפדפן ובחר “התקנה”. לא לבחור “יצירת קיצור דרך”.');installEvent.prompt();await installEvent.userChoice;installEvent=null;showInstall()}


function profileBox(){
  return `<div class="card"><h2 style="color:var(--gold);margin-top:0">האזור האישי שלי</h2>
    <div class="profileGrid">
      <label>רחוב<input id="editStreet" value="${clean(me.street)}"></label>
      <label>מספר בית<input id="editHouse" value="${clean(me.house)}"></label>
      <label>קומה<input id="editFloor" value="${clean(me.floor)}"></label>
      <label>דירה<input id="editApt" value="${clean(me.apartment)}"></label>
    </div>
    <label>הערה לשליח<textarea id="editNote">${clean(me.delivery_note||'')}</textarea></label>
    <button class="cta secondary" onclick="saveProfile()">שמור פרטי כתובת</button>
    <button class="cta secondary copyBtn" onclick="copyAddress()">העתק כתובת</button>
  </div>`;
}
async function saveProfile(){
  let row={street:document.getElementById('editStreet').value,house:document.getElementById('editHouse').value,floor:document.getElementById('editFloor').value,apartment:document.getElementById('editApt').value,delivery_note:document.getElementById('editNote').value};
  let r=await db.from('customers').update(row).eq('id',me.id).select('*').single();
  if(r.error)return toast('שגיאה',r.error.message);
  me=r.data;lastSync=new Date();addNotice('פרטים עודכנו','כתובת והערות השליח נשמרו.');screen();toast('נשמר','פרטי הכתובת עודכנו.');
}
function faqBox(){
  return `<div class="card faq"><h2 style="color:var(--gold);margin-top:0">שאלות נפוצות</h2>
    <details><summary>עד מתי אפשר לשנות הזמנה?</summary><p class="muted">אפשר לשנות מ־21:00 בערב ועד 12:00 בצהריים.</p></details>
    <details><summary>מה קורה אם אני ביום קבוע אבל רוצה יום אחר?</summary><p class="muted">אפשר ללחוץ “אני רוצה היום/מחר” כהזמנה חד־פעמית בלי לשנות את הימים הקבועים.</p></details>
    <details><summary>יותר מ־10 לחמניות?</summary><p class="muted">לחץ על בקשה להזמנה מיוחדת ונחזור אליך בוואטסאפ.</p></details>
  </div>`;
}
function loyaltyBox(){
  return `<div class="card"><h2 style="color:var(--gold);margin-top:0">הסטטוס שלך</h2>
    <div class="tagrow"><span class="tag"><b>${joinedDays()}</b>ימים מאז ההצטרפות</span><span class="tag"><b>${streak()}</b>רצף הזמנות</span></div>
  </div>`;
}

function areaBox(){return `<div class="card area-card"><h2 style="color:var(--gold);margin-top:0">📍 אזור פעילות נוכחי</h2><p class="muted">כרגע השירות פעיל רק ברחוב <b>${SERVICE_STREET}</b>.</p><div id="spotsLeft" class="spots">🥖 נותרו ${spotsLeft()} מתוך ${DAILY_LIMIT} מקומות להיום</div><p class="muted" style="font-size:13px">אנחנו מגבילים ל־${DAILY_LIMIT} הזמנות ביום כדי לשמור על טריות, דיוק ושירות טוב.<br>⏰ ניתן להוסיף הזמנה בכל יום מ־21:00 בערב ועד 12:00 בצהריים.</p></div>`}

let activeTab='order';
function setTab(t){activeTab=t;screen()}
function tabs(){
  const items=[['order','🥖','הזמנה'],['plan','📅','מנוי'],['account','👤','חשבון'],['help','❓','עזרה']];
  return `<div class="tabs">${items.map(([k,i,t])=>`<button class="tabBtn ${activeTab===k?'on':''}" onclick="setTab('${k}')">${i}<br>${t}</button>`).join('')}</div>`;
}

function screen(){
  let ok=todayWanted(),st=statusText(ok),isLocked=locked()||!inServiceArea()||limitFull();
  let oneTime = hasOneTimeToday() && currentPlan()==='custom' && !currentDays().includes(String(dIndex()));
  app.innerHTML=`${bell()}<section class="screen">
    <div class="pill"><span class="dot"></span>ערב 10 · הלחם של השכונה</div>
    <h1 class="hello">ערב טוב,<br>${clean(me.name)}</h1>
    ${tabs()}
    ${installBox()}

    <div class="tabPane ${activeTab==='order'?'on':''}">
      <div class="card heroStatus">
        <p class="muted" style="font-size:12px;margin:0 0 4px">מס׳ לקוח</p>
        <div class="badge">${clean(me.subscription_id)}</div>
        <div id="cloudState" class="cloud">${saving?'⏳ שומר בענן...':cloudText()}</div>
        <p class="muted">הסטטוס שלך</p>
        <div id="statusTitle" class="status-big">${st.title}</div>
        <p id="statusNote" class="muted status-note">${clean(st.note).replaceAll('\n','<br>')}</p>
        ${oneTime?`<p class="compact-note">✅ זו הזמנה חד־פעמית ל${orderWord()}. הימים הקבועים שלך לא השתנו.</p>`:''}
        ${orderFlow()}
      </div>

      ${areaBox()}

      <div class="card">
        <h2 style="color:var(--gold);margin-top:0">פעולה מהירה</h2>
        <p class="compact-note">גם אם היום לא מופיע בימים הקבועים שלך — אפשר לבצע כאן הזמנה חד־פעמית בלי לשנות את המנוי.</p>
        <div class="two">
          <button id="yesBtn" class="cta yes bigAction ${ok?'chosen':''} ${isLocked?'lockedBtn':''}" onclick="chooseToday(true)">אני רוצה ${orderWord()}</button>
          <button id="noBtn" class="cta no bigAction ${!ok?'chosen':''} ${locked()?'lockedBtn':''}" onclick="chooseToday(false)">היום לא</button>
        </div>
        <button class="cta secondary" onclick="refresh()">רענן סטטוס</button>
      </div>

      <div class="card">
        <h2 style="color:var(--gold);margin-top:0">פרטי ההזמנה</h2>
        <div class="miniLine"><span>יום</span><b>${dayName()}</b></div>
        <div class="miniLine"><span>חלון הזמנה</span><b>21:00–12:00</b></div>
        <div class="miniLine"><span>שעת חלוקה</span><b>18:30–20:00</b></div>
        <div class="miniLine"><span>כמות</span><b>10 לחמניות</b></div>
        <div class="miniLine"><span>כתובת</span><b>${clean(addr(me))}</b></div>
        <button class="cta secondary copyBtn" onclick="copyAddress()">העתק כתובת</button>
      </div>

      <div class="card">
        <h2 style="color:var(--gold);margin-top:0">כמות מיוחדת</h2>
        <p class="muted">צריך יותר מ־10 לחמניות? פנה אלינו ונעדכן ידנית.</p>
        <button class="cta secondary" onclick="specialOrder()">בקשה להזמנה מיוחדת</button>
      </div>
    </div>

    <div class="tabPane ${activeTab==='plan'?'on':''}">
      <h2 class="section-title">סוג המנוי</h2>
      <div class="grid">
        ${pcard('daily','כל ערב','ברירת המחדל היא לקבל בכל יום חלוקה. אין חלוקה ביום שישי.')}
        ${pcard('custom','ימים קבועים','בחר ימים קבועים. ביום שנבחר ברירת המחדל היא לקבל.')}
        ${pcard('manual','רק לפי הזמנה','ברירת המחדל היא שאין הזמנה.<br>ניתן להזמין מ־21:00 בערב ועד 12:00 בצהריים.')}
      </div>
      <div class="card" style="margin-top:18px">
        <p class="muted">סוג מנוי נוכחי</p>
        <h2 style="color:var(--gold);margin-top:0">${label()}</h2>
        <p class="compact-note">שינוי סוג מנוי לא מוחק הזמנה חד־פעמית שכבר סימנת להיום.</p>
      </div>
      ${loyaltyBox()}
      ${saveBox()}
    </div>

    <div class="tabPane ${activeTab==='account'?'on':''}">
      ${profileBox()}
      <div class="card" style="margin-top:18px">
        <p class="muted">רוצה לצאת מהמערכת?</p>
        <button class="cta secondary" onclick="out()">יציאה</button>
      </div>
      <div class="card" style="margin-top:18px">
        <p class="muted">רוצה לעצור זמנית את השירות?</p>
        <button class="cta smallDanger" onclick="pauseSub()">עצירת מנוי</button>
      </div>
    </div>

    <div class="tabPane ${activeTab==='help'?'on':''}">
      ${faqBox()}
      <button class="cta secondary helpBtn" onclick="help()">עזרה?</button>
    </div>

    <div class="credit"><a href="https://share.google/HUoheAjuVnUKozsP8">מבית zagzagwebs</a></div>
    <div class="muted" style="font-size:12px;text-align:center;margin-top:8px">גרסה 3.9 · מסודר בלשוניות · הזמנה חד־פעמית</div>
  </section>`;
  showInstall();
  startStatusTimer();
}

let pullStart=0;
document.addEventListener('touchstart',e=>{if(window.scrollY===0)pullStart=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{let end=e.changedTouches[0].clientY;if(pullStart&&end-pullStart>90&&me){addNotice('רענון','המסך מתעדכן עכשיו.');refresh()}pullStart=0},{passive:true});

start();
</script></body></html>
