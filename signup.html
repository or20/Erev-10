<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111006">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ערב 10">
<title>הצטרפות לערב 10 V2</title>
<link rel="manifest" href="./manifest-customer.webmanifest">
<link rel="stylesheet" href="./styles.css">
<style>
.hero-title{font-size:42px;line-height:1.05;margin:12px 0;font-weight:950}.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:9999;max-width:440px;margin:auto;background:rgba(18,14,7,.96);border:1px solid rgba(255,215,120,.32);border-radius:24px;padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.55)}.toast b{display:block;color:var(--gold);font-size:18px;margin-bottom:5px}.termsBox{max-height:250px;overflow:auto;border:1px solid rgba(255,215,120,.24);border-radius:18px;padding:14px;margin:12px 0;background:rgba(255,255,255,.055);color:var(--muted);line-height:1.58}.termsBox b,.termsBox h4{color:var(--gold);margin:10px 0 4px}.check{display:flex;gap:12px;align-items:flex-start;color:var(--text)}.check input{width:24px;height:24px;min-width:24px}.passwrap{position:relative}.eye{position:absolute;left:10px;top:34px;border:0;border-radius:12px;background:rgba(255,255,255,.08);color:var(--gold);padding:9px}.infoBox{border:1px solid rgba(255,215,120,.22);background:rgba(255,215,120,.07);border-radius:22px;padding:15px;line-height:1.55;margin:14px 0}.footer{margin:26px 0 5px;text-align:center;color:var(--muted);font-size:13px;line-height:1.7}.footer b{color:var(--gold);font-size:18px}.mini{font-size:13px;color:var(--muted);line-height:1.5}.wa{background:#25D366!important;color:#06140a!important}.installBox{display:none;margin-top:14px}.installBox.show{display:block;border-color:rgba(37,211,102,.35)}
</style>
</head>
<body>
<main id="app" class="app-shell"></main><div id="ui"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script>
<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
let installEvent=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installEvent=e;showInstall();});
const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY),app=document.querySelector('#app'),ui=document.querySelector('#ui'),passCol=['pass','word'].join('');let busy=false;
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('"','&quot;')}function digits(v){return String(v||'').replace(/\D/g,'')}function toast(t,s=''){ui.innerHTML=`<div class="toast"><b>${esc(t)}</b><p class="muted">${esc(s)}</p><button class="cta secondary" onclick="ui.innerHTML=''">סגור</button></div>`;setTimeout(()=>ui.innerHTML='',3500)}function nextSub(){return'E10-'+String(Date.now()).slice(-5)}function validCode(c){return/^\d{4,6}$/.test(c)&&!['0000','1111','2222','3333','4444','5555','6666','7777','8888','9999','1234','4321'].includes(c)}function toggle(id){let x=document.getElementById(id);if(x)x.type=x.type==='password'?'text':'password'}function wa(txt){location.href='https://wa.me/972527257775?text='+encodeURIComponent(txt)}function showInstall(){setTimeout(()=>{let b=document.getElementById('installBox');if(b&&installEvent&&!window.matchMedia('(display-mode: standalone)').matches)b.classList.add('show')},100)}async function installApp(){if(!installEvent)return toast('התקנה ידנית','פתח בתפריט הדפדפן ובחר “הוסף למסך הבית” או “התקנת אפליקציה”.');installEvent.prompt();await installEvent.userChoice;installEvent=null;let b=document.getElementById('installBox');if(b)b.classList.remove('show')}
function installCard(){return`<div id="installBox" class="card installBox"><h2 style="color:var(--gold);margin-top:0">📲 התקנת האפליקציה</h2><p class="muted">מומלץ להתקין את ערב 10 למסך הבית, כדי להיכנס מהר בכל יום.</p><button class="cta" onclick="installApp()">התקן את ערב 10</button></div>`}
function terms(){return`<b>תקנון שירות ראשוני - ערב 10</b><h4>1. השירות</h4>שירות חלוקת 10 לחמניות טריות עד דלת הבית באזורי חלוקה מוגדרים בלבד.<h4>2. אחריות ביטול מנוי</h4>האחריות לביטול המנוי חלה על הלקוח. מנוי שלא בוטל ימשיך לקבל משלוחים ויחויב בהתאם.<h4>3. כמות</h4>ברירת המחדל היא 10 לחמניות. להזמנה מעל 10 לחמניות יש ליצור קשר טלפוני.<h4>4. תשלום</h4>אי תשלום עשוי להביא לעצירת השירות.<h4>5. כתובת וגישה</h4>הלקוח אחראי למסירת כתובת מלאה, קוד כניסה והערות לשליח.<h4>6. אלרגנים ואיכות</h4>המוצר מסופק מהמאפייה. ייתכנו אלרגנים כגון גלוטן ושומשום.<h4>7. פרטיות</h4>הפרטים ישמשו לניהול השירות, משלוחים, גבייה וקשר עם הלקוח בלבד.<h4>8. אישור</h4>בסימון האישור הלקוח מצהיר שקרא והבין את התנאים.`}
function footer(){return`<div class="footer">🥖<br><b>ערב 10</b><br>לחמניות טריות עד הבית<br><button class="cta secondary" onclick="wa('היי אשמח לעזרה באפליקציה')">עזרה בוואטסאפ</button><span>Powered by ZAGZAGWEBS · v2.0</span></div>`}
function home(){app.innerHTML=`<section class="screen hero"><div class="pill"><span class="dot"></span>הצטרפות לשירות</div><h1 class="hero-title"><span class="gold">ערב 10</span><br>הלחם של השכונה</h1><div class="subtitle">10 לחמניות טריות עד דלת הבית בכל ערב</div><div class="card price-card"><div class="badge">מבצע השקה לחודש יולי</div><div class="price">₪20</div><p class="muted">לאחר יולי: ₪22 ליום</p><div class="divider"></div><p>לא צריך לרדת למאפייה. השירות מגיע עד הדלת.</p></div><div class="infoBox"><b>חשוב לדעת</b><br>כל מנוי כולל 10 לחמניות. להזמנה מעל 10 לחמניות יש ליצור קשר טלפוני.<button class="cta secondary" onclick="wa('היי, אני מעוניין להזמין יותר מ-10 לחמניות')">רוצה יותר מ־10?</button></div>${installCard()}<button class="cta" onclick="document.getElementById('signupForm').scrollIntoView({behavior:'smooth'})">הצטרפו עכשיו</button><button class="cta secondary wa" onclick="wa('שלום, אני מעוניין להצטרף לשירות ערב 10')">הצטרפו בוואטסאפ</button><section id="signupForm"><h2 class="section-title">רישום לתוכנית</h2><div class="card"><form class="form" onsubmit="signup(event)"><label>שם מלא<input name="name" required autocomplete="name"></label><label>טלפון<input name="phone" required inputmode="tel" autocomplete="tel"></label><label>רחוב<input name="street" required></label><label>מספר בית<input name="house" required></label><label>קומה<input name="floor" required></label><label>דירה<input name="apartment" required></label><label>קוד כניסה לבניין<input name="entry_code" required></label><label>הערה לשליח<textarea name="delivery_note" placeholder="לדוגמה: להניח ליד הדלת"></textarea></label><div class="passwrap"><label>צור קוד אישי 4-6 ספרות<input id="p1" name="password" required inputmode="numeric" type="password" autocomplete="new-password"></label><button class="eye" type="button" onclick="toggle('p1')">👁</button></div><div class="passwrap"><label>אימות קוד אישי<input id="p2" name="password2" required inputmode="numeric" type="password" autocomplete="new-password"></label><button class="eye" type="button" onclick="toggle('p2')">👁</button></div><h3 style="color:var(--gold)">תקנון השירות</h3><div class="termsBox">${terms()}</div><label class="small-card check"><input type="checkbox" name="terms" required><span>קראתי ואני מאשר/ת את תקנון השירות.</span></label><label class="small-card check"><input type="checkbox" name="cancel" required><span>ידוע לי שהאחריות לביטול המנוי חלה עליי, ומנוי שלא בוטל ימשיך לקבל משלוחים ויחויב בהתאם.</span></label><button id="signupBtn" class="cta" type="submit">יצירת חשבון</button></form></div></section><section><h2 class="section-title">כניסה קיימת</h2><button class="cta secondary" onclick="loginScreen()">כניסה עם טלפון וקוד אישי</button></section>${footer()}</section>`;showInstall()}
async function signup(e){e.preventDefault();if(busy)return;busy=true;let btn=document.getElementById('signupBtn');btn.textContent='שומר...';let d=Object.fromEntries(new FormData(e.target));let ph=digits(d.phone);function done(){busy=false;btn.textContent='יצירת חשבון'}if(ph.length<9){done();return toast('טלפון לא תקין')}if(d.password!==d.password2){done();return toast('הקודים אינם תואמים')}if(!validCode(d.password)){done();return toast('קוד חלש','בחר קוד אישי של 4-6 ספרות, לא 1234 ולא ספרות חוזרות.')}let exists=await db.from('customers').select('id').eq('phone',ph).maybeSingle();if(exists.error){done();return toast('שגיאה',exists.error.message)}if(exists.data){done();return toast('הטלפון כבר רשום','אפשר להתחבר או לבחור שכחתי קוד.')}let row={subscription_id:nextSub(),name:d.name,phone:ph,username:ph,street:d.street,house:d.house,floor:d.floor,apartment:d.apartment,entry_code:d.entry_code,delivery_note:d.delivery_note,admin_note:'נרשם דרך signup-v2',paid:false,active:true,skip_today:true};row[passCol]=d.password;let r=await db.from('customers').insert(row).select('*').single();done();if(r.error)return toast('שגיאה',r.error.message);localStorage.setItem('e10_client_id',String(r.data.id));toast('ההרשמה הושלמה','הקוד האישי נשמר. עוברים לאפליקציה.');setTimeout(()=>location.href='./client-v3.html',900)}
function loginScreen(){app.innerHTML=`<section class="screen"><h1 class="top-title">כניסה לערב 10</h1>${installCard()}<div class="card"><form class="form" onsubmit="login(event)"><label>טלפון<input name="phone" required inputmode="tel" autocomplete="tel"></label><div class="passwrap"><label>קוד אישי<input id="loginPass" name="password" required inputmode="numeric" type="password" autocomplete="current-password"></label><button class="eye" type="button" onclick="toggle('loginPass')">👁</button></div><button class="cta" type="submit">כניסה לאפליקציה</button></form><button class="cta secondary" onclick="forgot()">שכחתי קוד</button></div><button class="cta secondary" onclick="home()">חזרה להרשמה</button>${footer()}</section>`;showInstall()}
async function login(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let r=await db.from('customers').select('*').eq('phone',digits(d.phone)).eq(passCol,d.password).maybeSingle();if(r.error)return toast('שגיאה',r.error.message);if(!r.data)return toast('טלפון או קוד אישי לא נכונים');if(r.data.active===false)return toast('המנוי עצור','פנה לשירות להפעלה מחדש.');localStorage.setItem('e10_client_id',String(r.data.id));location.href='./client-v3.html'}
async function forgot(){let ph=prompt('הכנס מספר טלפון לאיפוס קוד');if(!ph)return;let r=await db.from('customers').select('id,name').eq('phone',digits(ph)).maybeSingle();if(r.error)return toast('שגיאה',r.error.message);if(r.data)toast('נמצא לקוח','בשלב זה פנה לשירות הלקוחות לאיפוס קוד.');else toast('לא נמצא לקוח','המספר לא קיים במערכת.')}
home();
</script>
</body>
</html>
